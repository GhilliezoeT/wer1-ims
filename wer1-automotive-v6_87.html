/* Aptos is a Microsoft system font - use it with fallbacks */
.sixt-font { font-family: 'Aptos', 'Aptos Bold', 'Calibri', 'Segoe UI', Arial, sans-serif; }
.sixt-num  { font-family: 'Aptos', 'Aptos Bold', 'Calibri', 'Segoe UI', Arial, sans-serif; font-weight: 700; }
.flam-checkbox-holder{display:inline-block;perspective:1000px;}
.flam-trigger{position:absolute;opacity:0;width:0;height:0;}
.flam-switch{position:relative;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px;color:#6DA5C0;transition:color .3s;}
.flam-cube{width:26px;height:26px;position:relative;transform-style:preserve-3d;transition:all .4s cubic-bezier(.34,1.56,.64,1);background:linear-gradient(145deg,#0f0020,#070a15);border:2px solid #7d00ff;border-radius:6px;box-shadow:inset 4px 4px 8px rgba(0,0,0,.7),inset -4px -4px 8px rgba(80,0,150,.3),0 0 15px rgba(125,0,255,.5);}
.flam-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);color:#fff;font-size:14px;font-weight:bold;opacity:0;transition:all .3s ease;z-index:2;text-shadow:0 0 10px #ff5500;}
.flam-aura{position:absolute;top:-10px;left:-10px;right:-10px;bottom:-10px;border-radius:12px;background:radial-gradient(circle,rgba(125,0,255,.3),transparent 70%);filter:blur(12px);opacity:0;transition:opacity .3s ease;z-index:-1;}
.flam-fire-container{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:100%;height:80px;opacity:0;transition:opacity .3s;z-index:1;pointer-events:none;}
.flam-flame{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:22px;height:0;background:linear-gradient(to top,transparent,#ff4500 40%,#ffcc00);border-radius:50% 50% 20% 20%;filter:blur(4px);animation:flame-expand .5s forwards,flame-flicker 1.5s infinite alternate .5s;}
.flam-sparks{position:absolute;width:100%;height:100%;opacity:0;transition:opacity .3s;}
.flam-spark{position:absolute;background:#ffcc00;border-radius:50%;filter:blur(1px);animation:spark-launch 1s forwards;}
.flam-switch:hover .flam-cube{transform:translateZ(20px) scale(1.05);box-shadow:inset 4px 4px 8px rgba(0,0,0,.7),0 0 20px rgba(125,0,255,.8);}
.flam-switch:hover{color:#00f7ff;}
.flam-trigger:checked + .flam-switch .flam-cube{background:linear-gradient(145deg,#ff3000,#0f0020);border-color:#ff5500;box-shadow:0 0 25px rgba(255,80,0,.8);}
.flam-trigger:checked + .flam-switch .flam-indicator{transform:translate(-50%,-50%) scale(1);opacity:1;}
.flam-trigger:checked + .flam-switch{color:#ff5500;}
.flam-trigger:checked + .flam-switch .flam-fire-container,.flam-trigger:checked + .flam-switch .flam-sparks{opacity:1;}
@keyframes flame-expand{0%{height:0}100%{height:40px}}
@keyframes flame-flicker{0%,100%{height:40px;opacity:1}50%{height:45px;opacity:.9}}
@keyframes spark-launch{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(calc(var(--spark-offset-x)*1px),calc(var(--spark-offset-y)*-1px)) scale(0);opacity:0}}
</style>

function lsSave(supaKeys){
  try {
    const payload = {};
    PERSIST_KEYS.forEach(k=>{ payload[k] = DB[k]; });
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
  } catch(e){ console.warn('localStorage opslaan mislukt:', e); }
  if(window.sbReady){
    var keys = supaKeys || Object.keys(window.SUPA_MAP);
    keys.forEach(function(k){ if(window.SUPA_MAP[k]) supaQueue(k); });
  }
}

function lsLoad(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const payload = JSON.parse(raw);
    PERSIST_KEYS.forEach(k=>{ if(payload[k] !== undefined) DB[k] = payload[k]; });
  } catch(e){ console.warn('localStorage laden mislukt:', e); }
}

// Normalise common Excel/screenshot values to our shift codes
function normaliseShift(raw){
  if(!raw) return '';
  const s = String(raw).trim().toUpperCase();
  if(s==='AM'||s==='OCHTEND'||s==='MORNING') return 'AM';
  if(s==='TU'||s==='TUSSEN'||s==='MID'||s==='MIDDLE'||s==='MIDDAG') return 'TU';
  if(s==='PM'||s==='AVOND'||s==='AFTERNOON'||s==='EVENING') return 'PM';
  if(s==='O') return 'O';
  if(s==='A') return 'A';
  if(s==='V'||s==='VRIJ'||s==='OFF'||s==='FREE'||s==='RDO') return 'V';
  if(s==='X'||s==='ZIEK'||s==='SICK'||s==='Z1'||s==='ZI') return 'X';
  if(s==='Z'||s==='AFW'||s==='AFWEZIG'||s==='ABS'||s==='absent') return 'Z';
  return '';
}

/* SHARED UI COMPONENTS */
function TagInput({tags, onChange, ph}) {
  const [v,setV] = useState('');
  const add = () => { const t=v.trim(); if(t && !tags.includes(t)) onChange([...tags,t]); setV(''); };
  return (
    <div>
      <div style={{display:'flex',gap:5}}>
        <input className="ti" value={v} onChange={e=>setV(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();add()}}}
          placeholder={ph||'+ toevoegen'} />
        <button className="btn btn-s btn-sm" onClick={add}>+</button>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:5}}>
        {tags.map((t,i)=><span key={i} className="tag">{t}<span className="tagd" onClick={()=>onChange(tags.filter((_,j)=>j!==i))}>×</span></span>)}
      </div>
    </div>
  );
}

function Modal({title, onClose, onSave, saveLabel='Opslaan', children, wide}) {
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal${wide?' mw':''}`}>
        <div className="mh">{title}<button className="bic" onClick={onClose}><Ic d={I.close} s={14}/></button></div>
        {children}
        <div className="mf">
          <button className="btn btn-s" onClick={onClose}>Annuleren</button>
          {onSave && <button className="btn btn-p" onClick={onSave}>{saveLabel}</button>}
        </div>
      </div>
    </div>
  );
}

function PBar({label, actual, target, note, compact}) {
  const pct = target>0 ? Math.min(Math.round((actual/target)*100),999) : null;
  const col = pct===null ? 'var(--text3)' : pColor(pct);
  return (
    <div style={{marginBottom:compact?7:11}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:compact?11:12,marginBottom:3,gap:8}}>
        <span style={{color:'var(--text2)',fontWeight:500,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{label}</span>
        <span style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
          <span style={{color:'var(--text)',fontWeight:700}}>{actual}</span>
          {target>0 && <><span style={{color:'var(--text3)'}}>/ {target}</span><span className={`badge ${pct>=100?'bg':pct>=70?'bo':'br'}`} style={{fontSize:9}}>{pct}%</span></>}
        </span>
      </div>
      {target>0 && <div className="pb-bg"><div className="pb-f" style={{width:`${Math.min(pct,100)}%`,background:col}}/></div>}
      {note && <div style={{fontSize:10,color:col,marginTop:2}}>{note}</div>}
    </div>
  );
}

function NLMap({markers}) {
  const conRef = useRef(null);
  const [dims, setDims] = useState({w:700,h:750});
  const [tip,  setTip]  = useState(null);
  const [hov,  setHov]  = useState(null);

  useEffect(()=>{
    const ro = new ResizeObserver(es=>{
      const w = es[0].contentRect.width||700;
      setDims({w, h:Math.round(w*1.08)});
    });
    if(conRef.current) ro.observe(conRef.current);
    return ()=>ro.disconnect();
  },[]);

  const W=dims.w, H=dims.h;

  // Mercator projection tuned exactly for NL
  const proj = ([lng,lat]) => {
    const MINLNG=3.15, MAXLNG=7.28, MINLAT=50.72, MAXLAT=53.60;
    const MG=0.025;
    const latRad=lat*Math.PI/180;
    const mercY=Math.log(Math.tan(Math.PI/4+latRad/2));
    const minR=Math.log(Math.tan(Math.PI/4+MINLAT*Math.PI/360));
    const maxR=Math.log(Math.tan(Math.PI/4+MAXLAT*Math.PI/360));
    return [
      W*(MG+(1-2*MG)*(lng-MINLNG)/(MAXLNG-MINLNG)),
      H*(MG+(1-2*MG)*(maxR-mercY)/(maxR-minR))
    ];
  };

// SVG Bar Chart
function BarChart({data, height=120, color='var(--accent)', showLabels=true}) {
  if(!data||!data.length) return (
    <div style={{color:'var(--text3)',fontSize:11,textAlign:'center',padding:20,background:'var(--bg3)',borderRadius:8}}>Geen data</div>
  );
  const vals = data.map(d=>d.v||0);
  const tgts = data.map(d=>d.target||0);
  const max  = Math.max(...vals,...tgts,1);
  const PAD  = showLabels?18:4, VPAD=12, chartH=height-PAD-VPAD;
  return (
    <svg viewBox={'0 0 100 '+height} preserveAspectRatio="none" style={{width:'100%',height,display:'block'}}>
      {[0.25,0.5,0.75,1].map(p=>(
        <line key={p} x1="0" x2="100" y1={VPAD+chartH*(1-p)} y2={VPAD+chartH*(1-p)} stroke="rgba(26,48,80,.4)" strokeWidth="0.4"/>
      ))}
      {data.map((d,i)=>{
        const n=data.length, bw=Math.min(14,(100/n)*0.55), gap=(100-n*bw)/(n+1);
        const x=gap+i*(bw+gap), bh=Math.max(1.5,((d.v||0)/max)*chartH), by=VPAD+chartH-bh;
        const col=d.color||(d.v===0?'rgba(107,149,187,.15)':(d.target&&d.v<d.target?'var(--danger)':color));
        const th=d.target>0?VPAD+chartH-(d.target/max)*chartH:null;
        return (
          <g key={i}>
            <rect x={x} y={VPAD} width={bw} height={chartH} rx="2" fill="rgba(26,48,80,.2)"/>
            <rect x={x} y={by} width={bw} height={bh} rx="2" fill={col}/>
            {th!==null&&<line x1={x-1.5} x2={x+bw+1.5} y1={th} y2={th} stroke="#f59e0b" strokeWidth="1" strokeDasharray="2,1" strokeLinecap="round"/>}
            {(d.v||0)>0&&<text x={x+bw/2} y={by-2} textAnchor="middle" fontSize="4.2" fill="rgba(221,238,255,.55)">{d.v}</text>}
            {showLabels&&<text x={x+bw/2} y={height-2} textAnchor="middle" fontSize="4" fill="var(--text3)">{String(d.l||'').slice(0,5)}</text>}
          </g>
        );
      })}
    </svg>
  );
}

// Ring Chart
function RingChart({value, max, color='var(--accent)', size=80, sub}) {
  const pct=max>0?Math.min(Math.max(value/max,0),1):0;
  const r=28,cx=40,cy=40,circ=2*Math.PI*r;
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" style={{flexShrink:0}}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(22,40,69,.9)" strokeWidth="9"/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="9"
        strokeDasharray={String(pct*circ)+' '+String(circ)} strokeLinecap="round"
        transform={'rotate(-90 '+cx+' '+cy+')'}/>
      <text x={cx} y={sub?cy-4:cy+5} textAnchor="middle" fontSize="14" fontWeight="800" fill={color} fontFamily="Syne,sans-serif">{Math.round(pct*100)}%</text>
      {sub&&<text x={cx} y={cy+9} textAnchor="middle" fontSize="5.5" fill="var(--text3)">{sub}</text>}
    </svg>
  );
}

// Sparkline
function Spark({data, color='var(--accent)', h=36}) {
  if(!data||data.length<2) return null;
  const vals=data.map(d=>d.v||0), max=Math.max(...vals,1), min=0, range=Math.max(max-min,1);
  const pts=vals.map((v,i)=>((i/(vals.length-1))*100)+','+(h-((v-min)/range)*(h-4)-2)).join(' ');
  return (
    <svg viewBox={'0 0 100 '+h} preserveAspectRatio="none" style={{width:'100%',height:h,display:'block'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
      <polyline points={'0,'+h+' '+pts+' 100,'+h} fill={color} opacity="0.08"/>
    </svg>
  );
}

/* DASHBOARD */
function Dashboard({user}) {
  const [tab,   setTab]  = useState('overview');
  const [period,setPrd]  = useState('month');
  const [selEmp,setSelE] = useState('');
  const [selCli,setSelC] = useState('');
  const [filterWeek,setFW] = useState('');   // YYYY-Wnn
  const [filterMonth,setFM]= useState('');   // YYYY-MM
  const [filterQ,setFQ]    = useState('');   // YYYY-Q1
  const [filterYear,setFY] = useState('');  // YYYY

  // Period window
  const now = new Date();
  var from, to, pLabel, workdays;

  // If specific week/month filter set, use that
  var useCustom = (period==='week'&&filterWeek)||(period==='month'&&filterMonth);
  if(period==='week'){
    if(filterWeek){
      // Parse ISO week YYYY-Wnn
      var parts=filterWeek.split('-W');
      var yr=parseInt(parts[0]),wn=parseInt(parts[1]);
      var jan4=new Date(yr,0,4);
      var startOfWeek=new Date(jan4.getTime()+((wn-1)*7-(jan4.getDay()||7)+1)*86400000);
      var endOfWeek=new Date(startOfWeek.getTime()+6*86400000);
      from=localDateStr(startOfWeek);
      to=localDateStr(endOfWeek);
      pLabel='Week '+wn+' ('+from+')';
    } else {
      var wd=getWeekDates(0); from=wd[0]; to=wd[6]; pLabel='Deze week';
    }
    workdays=5;
  } else if(period==='month'){
    if(filterMonth){
      var last2=new Date(parseInt(filterMonth.slice(0,4)),parseInt(filterMonth.slice(5,7)),0).toISOString().split('T')[0];
      from=filterMonth+'-01'; to=last2; pLabel=filterMonth;
    } else {
      var last=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0];
      from=TODAY.slice(0,7)+'-01'; to=last; pLabel='Deze maand';
    }
    workdays=22;
  } else if(period==='quarter'){
    var qStr = filterQ || (now.getFullYear()+'-Q'+Math.ceil((now.getMonth()+1)/3));
    var qParts = qStr.split('-Q');
    var qY=parseInt(qParts[0]), qN=parseInt(qParts[1]);
    var qStart=new Date(qY,(qN-1)*3,1);
    var qEnd=new Date(qY,qN*3,0);
    from=qStart.toISOString().split('T')[0];
    to=qEnd.toISOString().split('T')[0];
    pLabel='Q'+qN+' '+qY;
    workdays=65;
  } else {
    var y=filterYear?parseInt(filterYear):now.getFullYear(); from=y+'-01-01'; to=y+'-12-31'; pLabel=String(y); workdays=260;
  }
  var inP = function(d){return d>=from&&d<=to;};

  var pInsp   = DB.inspections.filter(function(i){return inP(i.date);});
  var pRoster = DB.roster.filter(function(r){return inP(r.date);});
  var mCount  = pInsp.reduce(function(s,i){return s+(i.count||1);},0);
  var tCount  = DB.inspections.filter(function(i){return i.date===TODAY;}).reduce(function(s,i){return s+(i.count||1);},0);
  var openI   = DB.inspections.filter(function(i){return i.status==='openstaand';}).length;
  var apkBad  = DB.vehicles.filter(function(v){return ['kritiek','verlopen'].includes(apkSt(v.apk));});
  var wDts    = getWeekDates(0);
  var tRoster = DB.roster.filter(function(r){return r.date===TODAY;});
  var tWork   = tRoster.filter(function(r){return WORK_SHIFTS.includes(r.shift)&&DB.employees.some(function(e){return e.id===r.empId&&e.active;});});
  var tSick   = tRoster.filter(function(r){return r.shift==='X'||r.shift==='Z';});
  var openClaims=(DB.claims||[]).filter(function(c){return c.status==='openstaand';});

  var fmt = function(n){return '\u20ac'+Number(n||0).toLocaleString('nl-NL',{maximumFractionDigits:0});};
  var pCol= function(p){return p===null?'var(--text2)':p>=100?'var(--green)':p>=70?'var(--warn)':'var(--danger)';};
  var sixM= function(fn){return Array.from({length:6},function(_,i){
    var d=new Date(); d.setMonth(d.getMonth()-5+i);
    var m=d.toISOString().slice(0,7);
    return {l:d.toLocaleString('nl-NL',{month:'short'}),v:fn(m)};
  });};

  // Employee stats
  var empStats=DB.employees.filter(function(e){return e.active;}).map(function(e){
    var ei=pInsp.filter(function(i){return i.empId===e.id;});
    var actual=ei.reduce(function(s,i){return s+(i.count||1);},0);
    var rDays=pRoster.filter(function(r){return r.empId===e.id&&WORK_SHIFTS.includes(r.shift);}).length;
    var tpd=(e.clients||[]).reduce(function(s,cid){
      var cl=DB.clients.find(function(c){return c.id===cid;});
      return s+(cl?cl.locations||[]:[] ).reduce(function(ss,l){return ss+(l.targetPerDay||0);},0);
    },0);
    var target=rDays*tpd;
    var sickD=pRoster.filter(function(r){return r.empId===e.id&&r.shift==='X';}).length;
    var absD =pRoster.filter(function(r){return r.empId===e.id&&r.shift==='Z';}).length;
    var eClaims=(DB.claims||[]).filter(function(c){return c.empId===e.id&&inP(c.date);});
    var pct=target>0?Math.round((actual/target)*100):null;
    var trend=sixM(function(m){return DB.inspections.filter(function(x){return x.empId===e.id&&x.date.startsWith(m);}).reduce(function(s,x){return s+(x.count||1);},0);});
    return {id:e.id,name:e.name,ct:e.contractType||'loondienst',
            actual:actual,target:Math.round(target),pct:pct,sickD:sickD,absD:absD,workD:rDays,
            claimN:eClaims.length,claimAmt:eClaims.reduce(function(s,c){return s+(c.amount||0);},0),
            chargeAmt:eClaims.reduce(function(s,c){return s+(c.chargeEmp||0);},0),trend:trend};
  });

  // Client stats
  var cliStats=DB.clients.filter(function(c){return !c.archived;}).map(function(c){
    var ci=pInsp.filter(function(i){return i.cliId===c.id;});
    var actual=ci.reduce(function(s,i){return s+(i.count||1);},0);
    var cClaims=(DB.claims||[]).filter(function(cl){return cl.cliId===c.id&&inP(cl.date);});
    var trend=sixM(function(m){return DB.inspections.filter(function(x){return x.cliId===c.id&&x.date.startsWith(m);}).reduce(function(s,x){return s+(x.count||1);},0);});
    var locs=(c.locations||[]).map(function(l){
      var li=pInsp.filter(function(i){return i.cliId===c.id&&i.loc===l.name;});
      return {name:l.name,actual:li.reduce(function(s,i){return s+(i.count||1);},0),target:(l.targetPerDay||0)*workdays};
    });
    return {id:c.id,name:c.name,type:c.type,actual:actual,locs:locs,
            claimN:cClaims.length,
            claimAmt:cClaims.reduce(function(s,cl){return s+(cl.amount||0);},0),
            openClaims:cClaims.filter(function(cl){return cl.status==='openstaand';}).length,
            trend:trend};
  });

  // Absence
  var absData=empStats.map(function(e){return Object.assign({},e,{total:e.sickD+e.absD});}).sort(function(a,b){return b.total-a.total;});

  // Extended stats: per-employee per-client breakdown
  var getShiftsInPeriod = function(empId, cliId) {
    return pRoster.filter(function(r){ return r.empId===empId && (!cliId||r.cliId===cliId) && WORK_SHIFTS.includes(r.shift); });
  };
  var getInspInPeriod = function(empId, cliId) {
    return pInsp.filter(function(i){ return i.empId===empId && (!cliId||i.cliId===cliId); });
  };

  // Per employee: list of {cliId, cliName, shifts, inspections, targetPerShift, target, avg}
  var empCliBreakdown = function(empId) {
    var emp = DB.employees.find(function(e){ return e.id===empId; });
    if(!emp) return [];
    return (emp.clients||[]).map(function(cid) {
      var cli = DB.clients.find(function(x){ return x.id===cid; });
      if(!cli) return null;
      var shifts = getShiftsInPeriod(empId, cid);
      var insps  = getInspInPeriod(empId, cid);
      var total  = insps.reduce(function(s,i){ return s+(i.count||1); }, 0);
      // Get targetPerDay for locations this employee works at
      var empLocs = (emp.clientLocs||{})[cid]||[];
      var locs = empLocs.length>0
        ? (cli.locations||[]).filter(function(l){ return empLocs.includes(l.name); })
        : (cli.locations||[]);
      var isDmg = cli.type==='autoverhuur';
      var workedLocsE = [];
      insps.forEach(function(i){ if(i.loc && workedLocsE.indexOf(i.loc)<0) workedLocsE.push(i.loc); });
      var targetLocsE = workedLocsE.length>0
        ? (cli.locations||[]).filter(function(l){ return workedLocsE.indexOf(l.name)>=0; })
        : locs;
      if(targetLocsE.length===0) targetLocsE = locs;
      var maxTpdE = (cli.locations||[]).reduce(function(mx,l){
        return Math.max(mx, isDmg?(l.dmgPerShift||0):(l.targetPerDay||0));
      }, 0);
      var avgTpd = workedLocsE.length>0 && targetLocsE.length>0
        ? targetLocsE.reduce(function(s,l){ return s+(isDmg?(l.dmgPerShift||0):(l.targetPerDay||0)); },0) / targetLocsE.length
        : maxTpdE;
      var target = 0;
      if(insps.length>0){
        insps.forEach(function(i){
          var loc=(cli.locations||[]).find(function(l){ return l.name===i.loc; });
          target += loc?(isDmg?(loc.dmgPerShift||0):(loc.targetPerDay||0)):avgTpd;
        });
        target = Math.round(target);
      } else {
        target = Math.round(shifts.length * avgTpd);
      }
      // For autoverhuur: read damage data from damageSheets, filter by individual day dates
      var dmgTotal=0; var dmgShifts=0; var allShifts=0;
      if(isDmg){
        (DB.damageSheets||[]).filter(function(ds){ return ds.cliId===cid; })
        .forEach(function(ds){
          (ds.days||[]).forEach(function(day){
            if(!inP(day.date)) return;
            if(day.date>TODAY) return;
            (day.shifts||[]).forEach(function(sf){
              if(sf.empId===empId){
                dmgTotal+=(sf.dmg||0);
                allShifts++;
                if((sf.dmg||0)>0) dmgShifts++;
              }
            });
          });
        });
      }
      var useTotal  = isDmg?dmgTotal:total;
      var useShifts = isDmg?allShifts:shifts.length;
      var avgShifts = isDmg?(dmgShifts>0?dmgShifts:allShifts):shifts.length;
      var dmgTgt    = isDmg?useShifts*(maxTpdE||5):target;
      var avg = avgShifts>0?(useTotal/avgShifts).toFixed(1):null;
      var pct = isDmg?(useShifts>0?Math.round((useTotal/dmgTgt)*100):null):(target>0?Math.round((total/target)*100):null);
      return {cliId:cid,cliName:cli.name,cliType:cli.type,isDmg:isDmg,shifts:useShifts,total:useTotal,inspTotal:total,avgTpd:isDmg?(maxTpdE||5).toFixed(1):avgTpd.toFixed(1),target:isDmg?dmgTgt:target,avg:avg,pct:pct};
    }).filter(Boolean);
  };

  // Per client: list of {empId, empName, shifts, inspections, target, avg}
  var cliEmpBreakdown = function(cliId) {
    var cli = DB.clients.find(function(x){ return x.id===cliId; });
    if(!cli) return [];
    var empList = DB.employees.filter(function(e){ return e.active&&(e.clients||[]).includes(cliId); });
    return empList.map(function(emp) {
      var shifts = getShiftsInPeriod(emp.id, cliId);
      var insps  = getInspInPeriod(emp.id, cliId);
      var total  = insps.reduce(function(s,i){ return s+(i.count||1); }, 0);
      var empLocs = (emp.clientLocs||{})[cliId]||[];
      var locs = empLocs.length>0
        ? (cli.locations||[]).filter(function(l){ return empLocs.includes(l.name); })
        : (cli.locations||[]);
      var isRental = cli.type==='autoverhuur';
      // Use the location the employee actually worked at (from inspections)
      // If multiple locations, take the most-used one or average of worked locations
      var workedLocs = [];
      insps.forEach(function(i){
        if(i.loc && workedLocs.indexOf(i.loc)<0) workedLocs.push(i.loc);
      });
      var targetLocs = workedLocs.length>0
        ? (cli.locations||[]).filter(function(l){ return workedLocs.indexOf(l.name)>=0; })
        : locs;
      if(targetLocs.length===0) targetLocs = locs;
      // When no inspections yet: use max targetPerDay (not average)
      var maxTpd = (cli.locations||[]).reduce(function(mx,l){
        return Math.max(mx, isRental?(l.dmgPerShift||0):(l.targetPerDay||0));
      }, 0);
      var avgTpd = workedLocs.length>0 && targetLocs.length>0
        ? targetLocs.reduce(function(s,l){ return s+(isRental?(l.dmgPerShift||0):(l.targetPerDay||0)); },0) / targetLocs.length
        : maxTpd;
      // For per-inspection accuracy: sum up target per inspection
      var target = 0;
      if(insps.length>0){
        insps.forEach(function(i){
          var loc = (cli.locations||[]).find(function(l){ return l.name===i.loc; });
          var locTarget = loc?(isRental?(loc.dmgPerShift||0):(loc.targetPerDay||0)):avgTpd;
          target += locTarget;
        });
        target = Math.round(target);
      } else {
        target = Math.round(shifts.length * avgTpd);
      }
      // For autoverhuur: read schades from damageSheets (not inspections)
      var useTotal = total;
      var useShifts = shifts.length;
      if(isRental){
        var dmgT=0; var dmgS=0; var allS=0;
        (DB.damageSheets||[]).filter(function(ds){ return ds.cliId===cliId; })
        .forEach(function(ds){
          (ds.days||[]).forEach(function(day){
            if(!inP(day.date)) return;
            if(day.date>TODAY) return;
            (day.shifts||[]).forEach(function(sf){
              if(sf.empId===emp.id){ dmgT+=(sf.dmg||0); allS++; if((sf.dmg||0)>0) dmgS++; }
            });
          });
        });
        useTotal = dmgT; useShifts = allS;
      }
      var avgS2   = isRental?(dmgS>0?dmgS:allS):useShifts;
      var avg    = avgS2>0 ? (useTotal/avgS2).toFixed(1) : null;
      var pct    = target>0 ? Math.round((useTotal/target)*100) : null;
      return { empId:emp.id, empName:emp.name, staffNr:emp.staffNr||'', shifts:useShifts, total:useTotal, avgTpd:avgTpd.toFixed(1), target:target, avg:avg, pct:pct, isRental:isRental };
    });
  };

        </div>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>

            <button key={pair[0]} onClick={function(){ setPrd(pair[0]); }}
              style={{padding:'7px 15px',borderRadius:6,border:'1px solid '+(period===pair[0]?'#0C7075':'#294D61'),background:period===pair[0]?'#0C7075':'transparent',color:period===pair[0]?'#000':'#6DA5C0',fontWeight:700,fontSize:13,cursor:'pointer',fontFamily:"'Aptos','Calibri',sans-serif"}}>
              {pair[1]}
            </button>
          ); })}
          {period==='week'&&(
            <input type="week" value={filterWeek} onChange={function(e){ setFW(e.target.value); }}
              style={{background:'#072E33',border:'1px solid #294D61',borderRadius:6,padding:'5px 9px',color:'#e8edf5',fontSize:12,cursor:'pointer'}}/>
          )}
          {period==='month'&&(
            <input type="month" value={filterMonth} onChange={function(e){ setFM(e.target.value); }}
              style={{background:'#072E33',border:'1px solid #294D61',borderRadius:6,padding:'5px 9px',color:'#e8edf5',fontSize:12,cursor:'pointer'}}/>
          )}
          {period==='quarter'&&(
            <select value={filterQ} onChange={function(e){ setFQ(e.target.value); }}
              style={{background:'#072E33',border:'1px solid #294D61',borderRadius:6,padding:'5px 9px',color:'#e8edf5',fontSize:12,cursor:'pointer'}}>
              <option value="">Huidig kwartaal</option>
              {[1,2,3,4].map(function(q){ return [String(new Date().getFullYear())+'-Q'+q, String(new Date().getFullYear()-1)+'-Q'+q]; }).flat().map(function(qv){ return <option key={qv} value={qv}>{qv}</option>; })}
            </select>
          )}
          {(filterWeek||filterMonth||filterQ)&&(
            <button onClick={function(){ setFW(''); setFM(''); setFQ(''); }}
              style={{padding:'5px 10px',borderRadius:6,border:'1px solid #294D61',background:'transparent',color:'#6DA5C0',fontSize:12,cursor:'pointer'}}>✕ Reset</button>

function RosterImport({clientId, onImported}) {
  const [drag,   setDrag]  = useState(false);
  const [log,    setLog]   = useState([]);
  const [preview,setPrev]  = useState([]);
  const [step,   setStep]  = useState('idle');
  const [apiKey, setApiKey]= useState(getStoredApiKey);
  const [showKey,setShowKey]= useState(false);

  const client = DB.clients.find(c=>c.id===clientId);

  // Helpers
  // Try to find an employee by partial name match (fuzzy, first/last name)
  const matchEmp = name => {
    if(!name) return null;
    const n = String(name).toLowerCase().trim().replace(/[^a-z\s]/g,'');
    const parts = n.split(/\s+/);
    // Exact match first
    let found = DB.employees.find(e=>e.active && e.name.toLowerCase()===n);
    if(found) return found;
    // Match any word of the employee's name against any word of input
    found = DB.employees.find(e=>{
      if(!e.active) return false;
      const eParts = e.name.toLowerCase().split(/\s+/);
      return parts.some(p=>p.length>2 && eParts.some(ep=>ep.startsWith(p)||p.startsWith(ep)));
    });
    return found||null;
  };

  // Parse a date value (JS Date object, Excel serial, ISO string, DD-MM-YYYY) -> YYYY-MM-DD
  const parseDate = val => {
    if(!val) return null;
    // JS Date object (SheetJS with cellDates:true, or Style C datetime values)
    if(val instanceof Date){
      if(isNaN(val.getTime())) return null;
      return val.toISOString().split('T')[0];
    }
    // Excel serial date number
    if(typeof val === 'number'){
      if(val < 1) return null; // time-only value
      const d = new Date(Math.round((val - 25569) * 86400000));
      return d.toISOString().split('T')[0];
    }
    const s = String(val).trim();
    // Already ISO YYYY-MM-DD
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
    // DD-MM-YYYY or DD/MM/YYYY
    const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if(m){
      const y = m[3].length===2?'20'+m[3]:m[3];
      return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    }
    return null;
  };

  // Core parser - 3 formats supported
  //  Style C (bevestiging plansysteem): blokken per dag
  //    Rij: Locatienaam  | (leeg) | datetime-datum
  //    Rij: "Inspecteur (AM)" | (leeg) | Naam | ... | starttijd | ... | eindtijd
  //    Rij: "Inspecteur (PM)" | ...
  //  Style B (row per shift): Naam | Datum | Shift | Locatie
  //  Style A (week grid): Naam in col-0, dag-kolommen rechts
  const parseRows = rows => {
    try {
      const clean = rows.filter(r=>r.some(c=>c!==null&&c!==undefined&&String(c).trim()!==''));
      if(!clean.length) return [];

      // Detect Style C: bevestigingsformat van plansysteem
      // Herkenningsteken: "Inspecteur (AM)" of "Inspecteur (PM)" in kolom 0
      const isInspRow = r => {
        const c0 = String(r[0]||'').toLowerCase();
        return c0.includes('inspecteur') && (c0.includes('am') || c0.includes('pm') || c0.includes('tu'));
      };
      const hasBevestiging = clean.some(r => isInspRow(r));

      // Helper: geeft datum terug uit een celwaarde (Date object, ISO string, of getal)
      const extractDate = val => {
        if(!val && val !== 0) return null;
        // JS Date object
        if(val instanceof Date) return isNaN(val)?null:val.toISOString().split('T')[0];
        const s = String(val).trim();
        if(!s || s==='null' || s==='undefined') return null;
        // ISO datetime "2026-03-09T00:00:00" or "2026-03-09"
        if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
        // M/D/YYYY or D/M/YYYY or MM/DD/YYYY
        const sl = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(sl){
          // Assume D/M/YYYY for Dutch context
          return `${sl[3]}-${sl[2].padStart(2,'0')}-${sl[1].padStart(2,'0')}`;
        }
        // Excel serial number
        if(/^\d+(\.\d+)?$/.test(s)) {
          const n = parseFloat(s);
          if(n > 40000 && n < 60000) {
            const d = new Date(Math.round((n - 25569)*86400000));
            return d.toISOString().split('T')[0];
          }
        }
        return parseDate(val);
      };

      const results = [];

      if(hasBevestiging){
        // Style C: bevestiging-format
        // Structuur per dag-blok (lege rijen worden al gefilterd in clean):
        //   Rij: "Europcar Nederland"   (klant - sla op als context)
        //   Rij: "Amsterdam Schiphol"  [leeg]  [datum]   <- locatie + datum
        //   Rij: "Inspecteur (AM)"     [leeg]  [naam]    <- shift + naam
        //   Rij: "Inspecteur (PM)"     [leeg]  [naam]    <- shift + naam

        let currentDate = null;
        let currentLoc  = null;

        clean.forEach((row, ri) => {
          const c0  = String(row[0]||'').trim();
          const c0l = c0.toLowerCase();
          // Col 2 (index 2) bevat ofwel een datum (op locatierij) ofwel een naam (op shift-rij)
          const c2  = row.length > 2 ? row[2] : null;

          // Sla footer-rijen over
          if(c0l.includes('vriendelijk') || c0l.includes('gegenereerd') || c0l.includes('pagina')) return;

          // Shift-rij: "Inspecteur (AM/PM/TU)"
          if(isInspRow(row)){
            let shift = null;
            if(c0l.includes('(am)')) shift = 'AM';
            else if(c0l.includes('(pm)')) shift = 'PM';
            else if(c0l.includes('(tu)') || c0l.includes('tussen')) shift = 'TU';
            if(!shift || !currentDate) return;

            const nameVal = String(c2||'').trim();
            if(!nameVal) return;

            const emp = matchEmp(nameVal);
            results.push({
              row: ri+1, date: currentDate, empName: nameVal, emp, shift,
              loc: currentLoc || client?.locations?.[0]?.name || '',
              ok: !!(currentDate && emp && shift)
            });
            return;
          }

          // Locatie+datum rij: col 2 bevat een datumwaarde
          const dateFromC2 = extractDate(c2);
          if(dateFromC2 && !c0l.includes('inspecteur')){
            currentLoc  = c0 || currentLoc;
            currentDate = dateFromC2;
            return;
          }

          // Klant-naam rij (bijv. "Europcar Nederland") - geen actie nodig
        });

      } else {
        // Styles A & B: table-based
        const headers = clean[0].map(h=>String(h||'').toLowerCase().trim());
        const colIdx  = kws => headers.findIndex(h=>kws.some(k=>h.includes(k)));
        const hasDate  = colIdx(['datum','date','dag']);
        const hasName  = colIdx(['naam','name','medewerker','employee','werknemer']);
        const hasShift = colIdx(['shift','dienst','rooster','type']);
        const hasLoc   = colIdx(['locatie','location','loc']);

        if(hasDate>=0 && hasName>=0){
          // Style B
          clean.slice(1).forEach((row,ri)=>{
            const nameVal = String(row[hasName]||'').trim();
            if(!nameVal) return;
            const date  = parseDate(row[hasDate]);
            const emp   = matchEmp(nameVal);
            const shift = normaliseShift(hasShift>=0 ? row[hasShift] : '');
            const loc   = String(hasLoc>=0 ? row[hasLoc] : '')||client?.locations?.[0]?.name||'';
            results.push({ row:ri+2, date, empName:nameVal, emp, shift, loc, ok:!!(date&&emp&&shift) });
          });
        } else {
          // Style A: week grid
          const dayNames = ['ma','di','wo','do','vr','za','zo','mon','tue','wed','thu','fri','sat','sun'];
          let dates = []; let dataStart = 1;
          for(let r=0;r<Math.min(4,clean.length);r++){
            const cells = clean[r].slice(1).map(c=>String(c||'').trim());
            if(cells.filter(c=>parseDate(c)).length>=3){ dates=clean[r].slice(1).map(v=>parseDate(v)); dataStart=r+1; break; }
            if(cells.filter(c=>dayNames.some(d=>c.toLowerCase().startsWith(d))).length>=3){ dates=getWeekDates(0); dataStart=r+1; break; }
          }
          if(!dates.length) dates=getWeekDates(0);
          clean.slice(dataStart).forEach((row,ri)=>{
            const nameVal=String(row[0]||'').trim(); if(!nameVal) return;
            const emp=matchEmp(nameVal);
            row.slice(1).forEach((cell,ci)=>{
              if(ci>=dates.length||!dates[ci]) return;
              const shift=normaliseShift(cell); if(!shift) return;
              results.push({ row:dataStart+ri+1, date:dates[ci], empName:nameVal, emp, shift, loc:client?.locations?.[0]?.name||'', ok:!!(dates[ci]&&emp&&shift) });
            });
          });
        }
      }
      return results;
    } catch(err){
      console.error('parseRows error:', err);
      return [{row:0,date:null,empName:'[!] Parse fout: '+err.message,emp:null,shift:null,loc:'',ok:false}];
    }
  };

  // File handlers
  const handleFile = file => {
    if(!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    setLog([]);

    if(ext==='csv'){
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const text  = e.target.result;
          // Auto-detect delimiter
          const delim = (text.split(';').length > text.split(',').length) ? ';' : ',';
          const rows  = text.split(/\r?\n/).map(l=>l.split(delim).map(c=>c.trim().replace(/^"|"$/g,'')));
          const parsed = parseRows(rows);
          if(!parsed.length){ setLog([{status:'err',msg:'Geen bruikbare rijen gevonden in CSV.'}]); setStep('done'); return; }
          setPrev(parsed); setStep('preview');
        } catch(err){
          setLog([{status:'err',msg:'CSV leesfout: '+err.message}]); setStep('done');
        }
      };
      reader.onerror = () => { setLog([{status:'err',msg:'Kon bestand niet openen.'}]); setStep('done'); };
      reader.readAsText(file, 'UTF-8');

    } else if(['xlsx','xls','ods'].includes(ext)){
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb   = XLSX.read(e.target.result, {type:'array', cellDates:true, raw:false});
          const ws   = wb.Sheets[wb.SheetNames[0]];
          // Use rawRows (all rows including blank) so Style C date detection works
          const rawRows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, blankrows:true});
          // Non-empty rows for parsing
          const rows = rawRows.filter(r => Array.isArray(r) && r.some(c => c !== null && c !== undefined && String(c).trim() !== ''));
          if(!rows.length){ setLog([{status:'err',msg:'Excel bestand lijkt leeg.'}]); setStep('done'); return; }
          const parsed = parseRows(rows);
          if(!parsed.length){
            // Show raw content for debugging
            const preview = rows.slice(0,6).map((r,i)=>`Rij${i+1}: ${r.map(c=>c===null?'-':String(c).slice(0,20)).join(' | ')}`).join('\n');
            setLog([{status:'err',msg:`Geen shifts gevonden. Eerste rijen:\n${preview}`}]);
            setStep('done'); return;
          }
          setPrev(parsed); setStep('preview');
        } catch(err){
          setLog([{status:'err',msg:'Excel leesfout: '+err.message+'\n'+err.stack?.slice(0,200)}]); setStep('done');
        }
      };
      reader.onerror = () => { setLog([{status:'err',msg:'Kon bestand niet openen.'}]); setStep('done'); };
      reader.readAsArrayBuffer(file);

    } else if(['png','jpg','jpeg','webp'].includes(ext)){
      const reader = new FileReader();
      reader.onload = e => {
        const b64 = e.target.result.split(',')[1];
        parseImageRoster(b64, ext);
      };
      reader.onerror = () => { setLog([{status:'err',msg:'Kon afbeelding niet lezen.'}]); setStep('done'); };
      reader.readAsDataURL(file);

    } else {
      setLog([{status:'err',msg:`Bestandstype .${ext} niet ondersteund. Gebruik .xlsx, .xls, .csv of een afbeelding (.png/.jpg).`}]);
      setStep('done');
    }
  };

  // AI image parsing via Anthropic API
  const [aiLoading, setAiLoading] = useState(false);
  const parseImageRoster = function(b64, ext) {
    var key = apiKey.trim();
    if(!key){
      setLog([{status:'err',msg:'❌ Voer eerst je Anthropic API key in.'}]);
      setStep('done'); return;
    }
    setStoredApiKey(key);
    setAiLoading(true);
    setStep('loading');
    var mime = (ext==='jpg'||ext==='jpeg')?'image/jpeg':ext==='webp'?'image/webp':'image/png';
    var weekStr = getWeekDates(0).join(', ');
    var prompt = 'Dit is een werkrooster. Lees alle shifts uit. '
      +'Week datums: '+weekStr+'. '
      +'Medewerkers: '+DB.employees.filter(function(e){return e.active;}).map(function(e){return e.name;}).join(', ')+'. '
      +'Geef ALLEEN een JSON array. '
      +'Elk item: {"name":"naam","date":"YYYY-MM-DD","shift":"AM|TU|PM|O|A|V|X|Z"}. '
      +'Shiftkodes: AM=ochtend, TU=tussen, PM=avond, O=aanwezig, V=vrij, X=ziek, Z=afwezig.';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:2000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mime,data:b64}},
          {type:'text',text:prompt}
        ]}]
      })
    })
    .then(function(resp){
      if(!resp.ok){
        return resp.text().then(function(errText){
          var j; try{j=JSON.parse(errText);}catch(_e){}
          throw new Error('API fout '+resp.status+(j&&j.error?': '+j.error.message:': '+errText.slice(0,150)));
        });
      }
      return resp.json();
    })
    .then(function(data){
      var text=(data.content||[]).map(function(x){return x.text||'';}).join('').trim();
      var clean=text.replace(/^```[\w]*[\n]?/,'').replace(/[\n]?```$/,'').trim();
      var parsed;
      try{parsed=JSON.parse(clean);}
      catch(_pe){throw new Error('AI gaf geen geldige JSON. Probeer duidelijkere afbeelding.');}
      if(!Array.isArray(parsed)) throw new Error('AI gaf geen array.');
      var rows2=parsed.map(function(item,i){
        return {
          row:i+1, date:item.date||getWeekDates(0)[0], empName:String(item.name||''),
          emp:matchEmp(item.name),
          shift:normaliseShift(item.shift)||String(item.shift||''),
          loc:String(item.location||(client&&client.locations&&client.locations[0]&&client.locations[0].name)||''),
          ok:!!(item.date&&matchEmp(item.name)&&normaliseShift(item.shift))
        };
      });
      setPrev(rows2); setStep('preview');
    })
    .catch(function(e){
      setLog([{status:'err',msg:'❌ '+e.message}]); setStep('done');
    })
    .finally(function(){ setAiLoading(false); });
  };

  // Commit to DB
  const commit = () => {
    let added=0, skipped=0;
    const good = prev.filter(r=>r.ok);
    good.forEach(r=>{
      const exists = DB.roster.find(x=>x.empId===r.emp.id&&x.date===r.date&&x.cliId===clientId);
      if(exists){ exists.shift=r.shift; if(r.loc) exists.loc=r.loc; skipped++; }
      else { DB.roster.push({id:nid('roster'),empId:r.emp.id,cliId:clientId,date:r.date,shift:r.shift,loc:r.loc||'',reason:''}); added++; }
    });
    setLog([
      {status:'ok', msg:`✅ ${added} shifts ingevoerd`},
      ...(skipped>0?[{status:'warn',msg:`🔄 ${skipped} bestaande shifts bijgewerkt`}]:[]),
      ...(prev.filter(r=>!r.ok).length>0?[{status:'warn',msg:`⚠️ ${prev.filter(r=>!r.ok).length} rijen overgeslagen (naam of datum niet herkend)`}]:[]),
    ]);
    scheduleSave(); setStep('done'); onImported();
  };

  const reset = () => { setStep('idle'); setLog([]); setPrev([]); };

  // Render
  return (
    <div className="imp-panel">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
        <div style={{fontFamily:'var(--fh)',fontSize:12.5,fontWeight:700,color:'var(--accent)'}}>📥 Rooster importeren</div>
        {step!=='idle'&&<button className="btn btn-s btn-sm" onClick={reset}>← Opnieuw</button>}
      </div>

      {step==='idle'&&(
        <>
          {/* API Key section - only shown for image upload */}
          <div style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:9,padding:11,marginBottom:11}}>
            <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
              <span style={{fontSize:13}}>🔑</span>
              <span style={{fontSize:11.5,fontWeight:700,color:'var(--text2)'}}>Anthropic API Key</span>
              <span style={{fontSize:9.5,color:'var(--text3)',marginLeft:'auto'}}>Vereist voor screenshot import</span>
            </div>
            <div style={{display:'flex',gap:6}}>
              <input
                type={showKey?'text':'password'}
                value={apiKey}
                onChange={e=>{setApiKey(e.target.value);setStoredApiKey(e.target.value);}}
                placeholder="sk-ant-api03-..."
                style={{flex:1,background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontSize:11.5,fontFamily:'monospace'}}
              />
              <button className="btn btn-s btn-sm" onClick={()=>setShowKey(v=>!v)} style={{flexShrink:0}}>{showKey?'🙈':'👁️'}</button>
            </div>
            {apiKey.startsWith('sk-ant')?
              <div style={{fontSize:9.5,color:'var(--green)',marginTop:5}}>✅ API key ingesteld · opgeslagen in browser</div>:
              apiKey.length>0?
              <div style={{fontSize:9.5,color:'var(--warn)',marginTop:5}}>⚠️ Key lijkt niet geldig (moet beginnen met sk-ant-…)</div>:
              <div style={{fontSize:9.5,color:'var(--text3)',marginTop:5}}>Haal je key op via <strong>console.anthropic.com</strong> → API Keys. Wordt lokaal opgeslagen, nooit verstuurd.</div>
            }
          </div>
          <div className={`imp-drop${drag?' drag':''}`}
            onDragOver={e=>{e.preventDefault();setDrag(true)}}
            onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])}}>
            <input type="file" accept=".xlsx,.xls,.csv,.png,.jpg,.jpeg,.webp"
              onChange={e=>handleFile(e.target.files[0])}/>
            <div style={{fontSize:22,marginBottom:6}}>📂</div>
            <div style={{fontWeight:600,color:'var(--text2)',marginBottom:3}}>Sleep bestand hierheen of klik</div>
            <div style={{fontSize:10.5,color:'var(--text3)'}}>Ondersteund: <strong>.xlsx</strong> · <strong>.xls</strong> · <strong>.csv</strong> · <strong>screenshot (.png/.jpg)</strong></div>
          </div>
          <div style={{marginTop:10,fontSize:10.5,color:'var(--text3)',lineHeight:1.7}}>
            <strong style={{color:'var(--text2)'}}>Verwachte kolomindeling Excel/CSV:</strong><br/>
            <span style={{fontFamily:'monospace',fontSize:10,color:'var(--text3)'}}>Naam | Datum | Shift | Locatie</span>&nbsp;&nbsp;of&nbsp;&nbsp;
            <span style={{fontFamily:'monospace',fontSize:10,color:'var(--text3)'}}>Naam | Ma | Di | Wo | Do | Vr | Za | Zo</span><br/>
            Shiftkodes: <span className="badge bb" style={{fontSize:9}}>AM</span> <span className="badge bb" style={{fontSize:9}}>TU</span> <span className="badge bb" style={{fontSize:9}}>PM</span> <span className="badge bg" style={{fontSize:9}}>O</span> <span className="badge bo" style={{fontSize:9}}>A</span> <span className="badge bw" style={{fontSize:9}}>V</span> <span className="badge br" style={{fontSize:9}}>X</span> <span className="badge bp" style={{fontSize:9}}>Z</span>
          </div>
        </>
      )}

      {step==='loading'&&(
        <div style={{textAlign:'center',padding:'22px 0',color:'var(--text2)'}}>
          <div style={{fontSize:22,marginBottom:8}}>🤖</div>
          <div style={{fontWeight:600,marginBottom:4}}>Afbeelding analyseren…</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>AI herkent namen, datums en shifts</div>
        </div>
      )}

      {step==='preview'&&prev.length>0&&(
        <>
          <div style={{fontSize:11.5,color:'var(--text2)',marginBottom:7}}>
            <strong style={{color:'var(--green)'}}>{prev.filter(r=>r.ok).length} shifts</strong> klaar om te importeren
            {prev.filter(r=>!r.ok).length>0&&<> · <strong style={{color:'var(--warn)'}}>{prev.filter(r=>!r.ok).length} niet herkend</strong></>}
          </div>
          {/* Warn about unmatched names */}
          {prev.filter(r=>!r.emp).length>0&&(
            <div className="al al-o" style={{marginBottom:8,fontSize:10.5}}>
              ⚠️ <strong>Onbekende namen</strong> — niet gevonden in medewerkersbeheer:<br/>
              <span style={{fontFamily:'monospace',color:'var(--warn)'}}>{[...new Set(prev.filter(r=>!r.emp).map(r=>r.empName))].join(', ')}</span><br/>
              <span style={{color:'var(--text3)'}}>Voeg deze medewerkers eerst toe onder <strong>Medewerkers</strong>, dan opnieuw importeren. Of importeer toch — de shifts worden zonder koppeling overgeslagen.</span>
            </div>
          )}
          <div style={{maxHeight:240,overflowY:'auto',marginBottom:11}}>
            {prev.map((r,i)=>(
              <div key={i} className={`imp-row ${r.ok?'imp-ok':'imp-warn'}`}>
                <span style={{fontSize:13}}>{r.ok?'✅':'⚠️'}</span>
                <span style={{width:50,flexShrink:0,fontFamily:'monospace',fontSize:10,color:'var(--text3)'}}>{r.date||'?'}</span>
                <span style={{flex:1,fontWeight:r.emp?600:400,color:r.emp?'var(--text)':'var(--warn)'}}>{r.empName}</span>
                {r.shift&&<span className={`badge ${SHIFT[r.shift]?'bb':'bw'}`} style={{fontSize:9}}>{r.shift}</span>}
                <span style={{fontSize:10,color:'var(--text3)',maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.loc}</span>
                {!r.emp&&<span style={{fontSize:9,color:'var(--warn)',whiteSpace:'nowrap'}}>naam onbekend</span>}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <button className="btn btn-p" onClick={commit} disabled={prev.filter(r=>r.ok).length===0}>
              ✅ Importeren ({prev.filter(r=>r.ok).length} shifts)
            </button>
            <button className="btn btn-s" onClick={reset}>Annuleren</button>
            {prev.filter(r=>r.ok).length===0&&<span style={{fontSize:10.5,color:'var(--warn)'}}>Geen koppelbare shifts — voeg medewerkers toe eerst.</span>}
          </div>
        </>
      )}
      {step==='preview'&&prev.length===0&&(
        <div className="al al-o">
          ⚠️ Geen shifts gevonden in het bestand.<br/>
          <span style={{fontSize:10.5}}>Controleer: heeft het bestand kolommen zoals <strong>Naam</strong>, <strong>Datum</strong>, <strong>Shift</strong>? Of een naam in kolom A met shiftkodes (AM/TU/PM/O/A/V/X) in de weekkolommen?</span>
        </div>
      )}

      {step==='done'&&(
        <div>
          {log.map((l,i)=>(
            <div key={i} className={`al al-${l.status==='ok'?'g':l.status==='warn'?'o':'r'}`} style={{marginBottom:5}}>
              {l.msg}
              {l.status==='err'&&l.msg.includes('kolom')&&(
                <div style={{marginTop:6,fontSize:10.5}}>
                  💡 <strong>Tips:</strong> zorg dat de eerste rij kolomnamen heeft zoals: <em>Naam, Datum, Shift, Locatie</em> — of een weekrooster met naam in kolom A en shiftkodes in de dagkolommen.
                </div>
              )}
            </div>
          ))}
          <button className="btn btn-s btn-sm" style={{marginTop:6}} onClick={reset}>← Opnieuw proberen</button>
        </div>
      )}
    </div>
  );
}

/* ROOSTER MODULE - CCC 08:00-17:00 */
// Time slots Car Control Centre 08:00-17:00
const CCC_HOURS = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];
const CCC_SLOTS = [];
for(var _h=8;_h<17;_h++) CCC_SLOTS.push(_h.toString().padStart(2,'0')+':00');

function RosterModule({user}) {
  var [wOff,setWO]      = React.useState(0);
  var [selC,setSC]      = React.useState(DB.clients[0]?.id||'');
  var [em,setEM]        = React.useState(false);
  var [form,setF]       = React.useState({});
  var [tick,setT]       = React.useState(0);
  var [showImport,setSI]= React.useState(false);
  var [viewMode,setVM]  = React.useState('week');
  var [selDay,setSD]    = React.useState(TODAY);
  var canEdit = ['admin','planner'].includes(user.role);
  var wDts = getWeekDates(wOff);
  var client = DB.clients.find(function(c){ return c.id===parseInt(selC); });
  var emps = DB.employees.filter(function(e){
    if(!e.active) return false;
    var cid = parseInt(selC);
    if(!(e.clients||[]).includes(cid)) return false;
    // Check locDates for this client
    var cli2 = DB.clients.find(function(x){ return x.id===cid; });
    var locs2 = (cli2&&cli2.locations)||[];
    var empLocs2 = (e.clientLocs||{})[cid]||[];
    var checkLocs = empLocs2.length>0
      ? locs2.filter(function(l){ return empLocs2.includes(l.name); })
      : locs2;
    var anyDates = checkLocs.some(function(l){
      var lk = String(cid)+"_"+l.name;
      var ld = (e.locDates||{})[lk]||{};
      return !!(ld.start||ld.end);
    });
    if(anyDates){
      // Dates set: show only when week overlaps with date range
      var wEnd = wDts[wDts.length-1];
      var wSt  = wDts[0];
      return checkLocs.some(function(l){
        var lk = String(cid)+"_"+l.name;
        var ld = (e.locDates||{})[lk]||{};
        if(!ld.start&&!ld.end) return true;
        return (!ld.start||wSt>=ld.start)&&(!ld.end||wSt<=ld.end);
      });
    }
    // No dates: always show regardless of clientStatus
    return true;
  });

  var getEntry = function(eid,d){ return DB.roster.find(function(r){ return r.empId===eid&&r.date===d&&r.cliId===parseInt(selC); }); };
  var openEdit = function(emp,d,ex){
    setF({empId:emp.id,cliId:parseInt(selC),date:d,
          timeStart:ex?.timeStart||'08:00',timeEnd:ex?.timeEnd||'17:00',
          shift:ex?.shift||'O',loc:ex?.loc||client?.locations?.[0]?.name||'',
          reason:ex?.reason||'',_xid:ex?.id});
    setEM(true);
  };
  var save = function(){
    var _xid=form._xid; var rest=Object.assign({},form); delete rest._xid;
    if(_xid){ var i=DB.roster.findIndex(function(r){ return r.id===_xid; }); if(i>=0) DB.roster[i]=Object.assign({},DB.roster[i],rest); }
    else DB.roster.push(Object.assign({},rest,{id:nid('roster')}));
    lsSave(); setT(function(x){ return x+1; }); setEM(false);
  };
  var del = function(id){ DB.roster.splice(DB.roster.findIndex(function(r){ return r.id===id; }),1); lsSave(); setT(function(x){ return x+1; }); };

  // Shift cycling: Europcar = AM->Tussen->PM->leeg | CCC/other = EOL->Flex->leeg
  var EURO_SHIFTS = ['AM','Tussen','PM'];
  var CCC_SHIFTS  = ['EOL','Flex'];
  var cycleShift = function(empId, date) {
    var cliNow = DB.clients.find(function(x){ return x.id===parseInt(selC); });
    var isEuro = cliNow&&cliNow.name&&cliNow.name.toLowerCase().includes('europcar');
    var existing = DB.roster.find(function(r){ return r.empId===empId&&r.date===date&&r.cliId===parseInt(selC); });
    var seq = isEuro ? EURO_SHIFTS : CCC_SHIFTS;
    if(!existing) {
      DB.roster.push({id:nid('roster'),empId:empId,cliId:parseInt(selC),date:date,shift:'O',shiftType:seq[0],timeStart:'08:00',timeEnd:'17:00',loc:cliNow&&cliNow.locations&&cliNow.locations[0]?cliNow.locations[0].name:'',reason:''});
    } else {
      var cur = existing.shiftType || seq[0];
      var idx = seq.indexOf(cur);
      if(idx < seq.length-1) {
        existing.shiftType = seq[idx+1];
      } else {
        DB.roster.splice(DB.roster.findIndex(function(r){ return r.id===existing.id; }),1);
      }
    }
    lsSave(); setT(function(x){ return x+1; });
  };

  var sickWeek = DB.roster.filter(function(r){ return r.cliId===parseInt(selC)&&wDts.includes(r.date)&&['X','Z'].includes(r.shift); });

  var calcHours = function(ts,te){
    if(!ts||!te) return 0;
    var sh=parseInt(ts.split(':')[0]),eh=parseInt(te.split(':')[0]);
    return Math.max(0,eh-sh);
  };

  var dayEmps    = DB.employees.filter(function(e){ return e.active&&(e.clients||[]).includes(parseInt(selC)); });
  var dayEntries = DB.roster.filter(function(r){ return r.cliId===parseInt(selC)&&r.date===selDay&&DB.employees.some(function(e){return e.id===r.empId&&e.active;}); });

  // Teal color palette
  var T = {
    bg:     '#05161A',
    bg2:    '#072E33',
    bg3:    '#0C7075',
    accent: '#0F969C',
    light:  '#6DA5C0',
    muted:  '#294D61',
    white:  '#ffffff',
    yellow: '#f5c800',
    green:  '#00e87a',
    red:    '#ef4444',
    purple: '#b3a6fa',
    font:   "'Aptos','Calibri','Segoe UI',Arial,sans-serif",
  };

  var thS = {padding:'10px 14px',textAlign:'left',borderBottom:'2px solid '+T.accent,background:T.bg2,color:T.accent,fontSize:13,fontFamily:T.font,fontWeight:700};
  var thC = Object.assign({},thS,{textAlign:'center'});

  var shiftBadge = function(sh){
    if(sh==='X') return {bg:'rgba(239,68,68,.2)',  color:'#ef4444',   label:'Ziek'};
    if(sh==='Z') return {bg:'rgba(179,166,250,.2)',color:'#b3a6fa',   label:'Afwezig'};
    if(sh==='V') return {bg:'rgba(109,165,192,.2)',color:T.light,     label:'Vrij'};
    return           {bg:'rgba(15,150,156,.25)',   color:T.accent,    label:'Aanwezig'};
  };

  return (
    <div style={{background:T.bg,minHeight:'100vh',padding:'0 0 40px',margin:'-16px',fontFamily:T.font}}>

      {/* Header */}
      <div style={{background:T.bg,borderBottom:'3px solid '+T.accent,padding:'18px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:16}}>

          <div>
            <div style={{color:T.white,fontSize:18,fontWeight:700,fontFamily:T.font}}>Rooster</div>
            <div style={{color:T.accent,fontSize:12,fontFamily:T.font,marginTop:2}}>{client?client.name:'Rooster'} · {fmtDate(wDts[0])} t/m {fmtDate(wDts[6])}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          {['week','day'].map(function(v){
            return <button key={v} onClick={function(){ setVM(v); }} style={{padding:'7px 14px',borderRadius:6,border:'1px solid '+(viewMode===v?T.accent:T.muted),background:viewMode===v?T.accent:'transparent',color:viewMode===v?'#000':T.light,fontFamily:T.font,fontWeight:700,fontSize:12,cursor:'pointer'}}>{v==='week'?'Week':'Dag'}</button>;
          })}
          {canEdit&&<button onClick={function(){ setSI(function(x){ return !x; }); }} style={{padding:'7px 14px',borderRadius:6,border:'1px solid '+(showImport?T.accent:T.muted),background:showImport?T.accent:'transparent',color:showImport?'#000':T.light,fontFamily:T.font,fontWeight:700,fontSize:12,cursor:'pointer'}}>📥 Import</button>}
        </div>
      </div>

      <div style={{padding:'16px 24px'}}>

        {/* Controls bar */}
        <div style={{background:T.bg2,border:'1px solid '+T.muted,borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          <select value={selC} onChange={function(e){ setSC(e.target.value); }}
            style={{background:T.bg,border:'1px solid '+T.muted,borderRadius:6,padding:'6px 10px',color:T.white,fontSize:12,fontFamily:T.font,minWidth:160}}>
            {DB.clients.map(function(c){ return <option key={c.id} value={c.id}>{c.name}</option>; })}
          </select>
          {viewMode==='week'?(
            <>
              <button onClick={function(){ setWO(function(w){ return w-1; }); }} style={{padding:'6px 13px',borderRadius:6,border:'1px solid '+T.muted,background:'transparent',color:T.light,fontFamily:T.font,fontSize:12,cursor:'pointer',fontWeight:600}}>← Vorige</button>
              <button onClick={function(){ setWO(0); }} style={{padding:'6px 13px',borderRadius:6,border:'1px solid '+T.accent,background:T.accent,color:'#000',fontFamily:T.font,fontSize:12,cursor:'pointer',fontWeight:700}}>Vandaag</button>
              <button onClick={function(){ setWO(function(w){ return w+1; }); }} style={{padding:'6px 13px',borderRadius:6,border:'1px solid '+T.muted,background:'transparent',color:T.light,fontFamily:T.font,fontSize:12,cursor:'pointer',fontWeight:600}}>Volgende →</button>
              <span style={{fontSize:11,color:T.light,fontFamily:T.font}}>{fmtDate(wDts[0])} t/m {fmtDate(wDts[6])}</span>
            </>
          ):(
            <>
              <input type="date" value={selDay} onChange={function(e){ setSD(e.target.value); }}
                style={{background:T.bg,border:'1px solid '+T.muted,borderRadius:6,padding:'6px 10px',color:T.white,fontSize:12,fontFamily:T.font}}/>
              <span style={{fontSize:11,color:T.light,fontFamily:T.font}}>Dagschema</span>
            </>
          )}
        </div>

        {showImport&&canEdit&&(
          <RosterImport clientId={parseInt(selC)} onImported={function(){ setT(function(x){ return x+1; }); setSI(false); }}/>
        )}

        {/* ── WEEK VIEW ── */}
        {viewMode==='week'&&(
          <div>
            <div style={{background:T.bg2,border:'1px solid '+T.muted,borderRadius:10,overflow:'hidden',marginBottom:14}}>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12,fontFamily:T.font,minWidth:700}}>
                  <thead>
                    <tr style={{background:T.bg}}>
                      <th style={Object.assign({},thS,{minWidth:140,width:140})}>Medewerker</th>
                      {wDts.map(function(d,i){
                        var isT=d===TODAY;
                        return (
                          <th key={d} style={{padding:'10px 4px',textAlign:'center',borderBottom:'2px solid '+T.accent,background:isT?'rgba(15,150,156,.15)':T.bg,color:isT?T.accent:T.light,fontSize:11,fontFamily:T.font,fontWeight:700,minWidth:86}}>
                            <div style={{textTransform:'uppercase',letterSpacing:.5}}>{WD[i]}</div>
                            <div style={{fontSize:10,fontWeight:400,marginTop:2}}>{fmtDate(d).slice(0,5)}</div>

                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {emps.length===0&&(
                      <tr><td colSpan={8} style={{padding:'20px 14px',color:T.muted,fontSize:12,textAlign:'center',fontStyle:'italic'}}>Geen medewerkers gekoppeld aan {client?.name}</td></tr>
                    )}
                    {emps.map(function(emp,ei){
                      return (
                        <tr key={emp.id} style={{background:ei%2===0?T.bg2:'rgba(5,22,26,.6)',borderBottom:'1px solid '+T.muted}}>
                          <td style={{padding:'8px 14px',verticalAlign:'middle'}}>
                            <div style={{fontWeight:700,fontSize:12,color:T.white,fontFamily:T.font}}>{emp.name}</div>
                            <div style={{fontSize:9,color:'#0F969C',marginTop:1}}>{(emp.roles||[]).join(', ')||'Inspecteur'}</div>
                            <div style={{fontSize:9,color:T.muted,marginTop:1}}>
                              {emp.transport==='eigen auto'?'🚗'+(emp.plate?' '+emp.plate:''):emp.transport==='OV'?'🚌 OV':emp.transport==='WER1 auto'?'🚘 WER1':''}
                            </div>
                          </td>
                          {wDts.map(function(d){
                            var entry=getEntry(emp.id,d); var isT=d===TODAY;
                            var isSick=entry&&['X','Z'].includes(entry.shift);
                            var hrs=entry&&!isSick?calcHours(entry.timeStart,entry.timeEnd):0;
                            var sb=entry?shiftBadge(entry.shift):null;
                            return (
                              <td key={d} style={{padding:'4px',textAlign:'center',verticalAlign:'middle',background:isT?'rgba(15,150,156,.06)':'',borderLeft:'1px solid '+T.muted}}>
                                {entry?(
                                  <div onClick={function(){ if(canEdit) cycleShift(emp.id,d); }} onDoubleClick={function(){ if(canEdit) openEdit(emp,d,entry); }}

/* AUTOVERHUUR SCHADE TRACKER */
// DB.damageSheets: [{id,cliId,weekStart,days:[{date,returns,damages,shifts:[{empId,shift,dmg}]}]}]
function normalizeDamageSheetDates(){
  if(!DB.damageSheets) return;
  var changed=false;
  var toRemove=[];
  DB.damageSheets.forEach(function(ds){
    var d = new Date(ds.weekStart+'T12:00:00');
    var dow = d.getDay();
    if(dow===0) dow=7;
    if(dow!==1){
      changed=true;
      toRemove.push(ds.id);
      ds.days.forEach(function(day){
        if(!day.shifts||!day.shifts.length) return;
        var dd = new Date(day.date+'T12:00:00');
        var ddow = dd.getDay(); if(ddow===0) ddow=7;
        var mondayD = new Date(dd);
        mondayD.setDate(dd.getDate()-(ddow-1));
        var monStr = mondayD.getFullYear()+'-'+
          String(mondayD.getMonth()+1).padStart(2,'0')+'-'+
          String(mondayD.getDate()).padStart(2,'0');
        var target = DB.damageSheets.find(function(x){
          return x.cliId===ds.cliId&&x.weekStart===monStr&&x.id!==ds.id;
        });
        if(!target){
          var wdays=[];
          for(var i=0;i<7;i++){
            var xd=new Date(mondayD); xd.setDate(mondayD.getDate()+i);
            wdays.push({
              date:xd.getFullYear()+'-'+String(xd.getMonth()+1).padStart(2,'0')+'-'+String(xd.getDate()).padStart(2,'0'),
              returns:0,shifts:[]
            });
          }
          target={id:nid('damageSheets'),cliId:ds.cliId,weekStart:monStr,days:wdays};
          DB.damageSheets.push(target);
        }
        var tDay = target.days.find(function(x){ return x.date===day.date; });
        if(tDay){
          day.shifts.forEach(function(sf){
            var ex=tDay.shifts.find(function(x){ return x.empId===sf.empId; });
            if(ex){ if(!ex.dmg) ex.dmg=sf.dmg; }
            else tDay.shifts.push(Object.assign({},sf));
          });
          if(day.returns&&!tDay.returns) tDay.returns=day.returns;
        }
      });
    }
  });
  if(toRemove.length){
    DB.damageSheets=DB.damageSheets.filter(function(ds){ return toRemove.indexOf(ds.id)<0; });
  }
  if(changed) lsSave();
}
function initDamageSheets(){
  if(!DB.damageSheets) DB.damageSheets=[];
  normalizeDamageSheetDates();
}

/* SCHADE TRACKER */
function DamageTracker({user}) {
  initDamageSheets();
  var rental  = DB.clients.filter(function(cl){ return cl.type==='autoverhuur'; });
  var euroCli = DB.clients.find(function(cl){ return cl.name&&cl.name.toLowerCase().indexOf('europcar')>=0; })||null;

  var [selC,   setSC]   = React.useState(euroCli?euroCli.id:(rental[0]?rental[0].id:null));
  var [wOff,   setWO]   = React.useState(0);
  var [period, setPer]  = React.useState('week');
  var [selLoc, setSelLoc] = React.useState('all');
  var [tick,   setT]    = React.useState(0);
  var canEdit = ['admin','planner','inspecteur'].includes(user.role);

  var MONTHS = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  var now = new Date();
  var [selYear,  setSelYear]  = React.useState(now.getFullYear());
  var [selMonth, setSelMonth] = React.useState(now.getMonth());
  var [selQ,     setSelQ]     = React.useState(Math.floor(now.getMonth()/3));

  var client  = DB.clients.find(function(cl){ return cl.id===selC; });
  var wDts    = getWeekDates(wOff);
  var wStart  = wDts[0];
  var DMG_SHIFT_TARGET = 5;
  var DMG_PCT_TARGET   = 5;
  var DAY_RETURNS      = 100;

  var EC = {
    bg:'#021a0d', bgCard:'#062912', bgRow1:'#041f0e', bgRow2:'#073318',
    bgHeader:'#041507', green:'#00c853', green2:'#00a844', green3:'#1a8a4a',
    yellow:'#f5c800', white:'#e8f5ee', grey:'#7ab898', greyDk:'#3a6b50',
    border:'#0d5a30', borderL:'rgba(0,168,68,.2)', borderA:'rgba(0,200,83,.35)',
    font:"'Aptos','Calibri','Segoe UI',Arial,sans-serif",
  };

  var thS = {padding:'9px 10px',textAlign:'left',borderBottom:'2px solid '+EC.yellow,background:EC.bgHeader,color:EC.yellow,fontSize:11,fontFamily:EC.font,fontWeight:700,whiteSpace:'nowrap'};
  var thC = Object.assign({},thS,{textAlign:'center'});

  var getSheet = function() {
    var s = DB.damageSheets.find(function(x){ return x.cliId===selC&&x.weekStart===wStart; });
    if(!s){
      s = {id:nid('damageSheets'),cliId:selC,weekStart:wStart,
           days:wDts.map(function(d){ return {date:d,returns:0,shifts:[]}; })};
      DB.damageSheets.push(s);
      lsSave();
    }
    return s;
  };
  var sheet = selC ? getSheet() : null;

  var activeEmps = DB.employees.filter(function(e){
    if(!e.active) return false;
    if(!(e.clients||[]).includes(selC)) return false;
    // Location filter
    if(selLoc!=="all"){
      var empLocs=(e.clientLocs||{})[selC]||[];
      if(empLocs.length>0&&empLocs.indexOf(selLoc)<0) return false;
    }
    // Check locDates: if set, only show when current week overlaps
    var cli3 = DB.clients.find(function(x){ return x.id===selC; });
    var locs3 = (cli3&&cli3.locations)||[];
    var empLocs3 = (e.clientLocs||{})[selC]||[];
    var checkLocs3 = empLocs3.length>0
      ? locs3.filter(function(l){ return empLocs3.includes(l.name); })
      : locs3;
    var anyDates3 = checkLocs3.some(function(l){
      var lk = String(selC)+"_"+l.name;
      var ld = (e.locDates||{})[lk]||{};
      return !!(ld.start||ld.end);
    });
    if(anyDates3){
      return checkLocs3.some(function(l){
        var lk = String(selC)+"_"+l.name;
        var ld = (e.locDates||{})[lk]||{};
        if(!ld.start&&!ld.end) return true;
        return (!ld.start||wDts[0]>=ld.start)&&(!ld.end||wDts[0]<=ld.end);
      });
    }
    // No dates: always show
    return true;
  });


  var SHIFT_OPTS = ['AM','Tussen','PM'];
  var SHIFT_COLS = {AM:'rgba(0,168,68,.75)',Tussen:'rgba(0,80,35,.85)',PM:'rgba(200,155,0,.75)'};

  var getShift = function(empId,date) {
    var day = sheet&&sheet.days.find(function(d){ return d.date===date; });
    return day?day.shifts.find(function(s){ return s.empId===empId; })||null:null;
  };

  var setDayReturns = function(date,val) {
    var s=getSheet();
    var day=s.days.find(function(d){ return d.date===date; });
    if(day) day.returns=parseInt(val)||0;
    lsSave(); setT(function(x){ return x+1; });
  };

  var cycleShift = function(empId,date) {
    if(!canEdit) return;
    var s=getSheet();
    var day=s.days.find(function(d){ return d.date===date; });
    if(!day) return;
    var idx=day.shifts.findIndex(function(x){ return x.empId===empId; });
    if(idx<0){ day.shifts.push({empId:empId,shift:'AM',dmg:0}); }
    else {
      var cur=day.shifts[idx].shift;
      var ni=SHIFT_OPTS.indexOf(cur);
      if(ni<SHIFT_OPTS.length-1) day.shifts[idx]=Object.assign({},day.shifts[idx],{shift:SHIFT_OPTS[ni+1]});
      else day.shifts.splice(idx,1);
    }
    lsSave(); setT(function(x){ return x+1; });
  };

  var setShiftDmg = function(empId,date,val) {
    var s=getSheet();
    var day=s.days.find(function(d){ return d.date===date; });
    if(!day) return;
    var sf=day.shifts.find(function(x){ return x.empId===empId; });
    if(sf) sf.dmg=parseInt(val)||0;
    // Auto-create/update inspection for this shift
    var dmgVal=parseInt(val)||0;
    if(dmgVal>0&&sf){
      var loc=client&&client.locations&&client.locations[0]?client.locations[0].name:'';
      // Sync ras slots from shift
      if(!sf.ras) sf.ras=[];
      while(sf.ras.length<dmgVal) sf.ras.push({ra:'',plate:''});
      if(sf.ras.length>dmgVal) sf.ras=sf.ras.slice(0,dmgVal);
      var existing=DB.inspections.find(function(i){
        return i.empId===empId&&i.date===date&&i.cliId===selC&&i.shiftType===sf.shift;
      });
      if(existing){
        existing.dmg=dmgVal;
        existing.count=dmgVal;
        // Resize ras to match new dmg count
        if(!existing.ras) existing.ras=[];
        while(existing.ras.length<dmgVal) existing.ras.push({ra:'',plate:''});
        if(existing.ras.length>dmgVal) existing.ras=existing.ras.slice(0,dmgVal);
      } else {
        DB.inspections.push({
          id:nid('insp'),empId:empId,cliId:selC,
          loc:loc,date:date,type:'Rental',
          count:dmgVal,dmg:dmgVal,ret:day.returns||0,
          status:'openstaand',notes:'',plate:'',
          rentalAgreement:'',shiftType:sf.shift
        });
      }
    }
    lsSave(); setT(function(x){ return x+1; });
  };

  var empWeekStats = activeEmps.map(function(e){
    var shifts=0,totalDmg=0;
    (sheet?sheet.days:[]).forEach(function(day){
      var sf=day.shifts.find(function(s){ return s.empId===e.id; });
      if(sf){ shifts++; totalDmg+=(sf.dmg||0); }
    });
    var onTarget=totalDmg>=(shifts*DMG_SHIFT_TARGET);
    var pct=shifts>0?((totalDmg/shifts)).toFixed(1):null;
    return Object.assign({},e,{shifts:shifts,totalDmg:totalDmg,onTarget:onTarget,avgPerShift:pct});
  });

  var dayTotals=(sheet?sheet.days:[]).map(function(day){
    var ret=day.returns||0;
    var dmg=day.shifts.reduce(function(a,s){ return a+(s.dmg||0); },0);
    var pct=ret>0?((dmg/ret)*100).toFixed(1):null;
    return {date:day.date,ret:ret,dmg:dmg,pct:pct};
  });

  var weekRet=dayTotals.reduce(function(a,d){ return a+d.ret; },0);
  var weekDmg=dayTotals.reduce(function(a,d){ return a+d.dmg; },0);
  var weekPct=weekRet>0?((weekDmg/weekRet)*100).toFixed(1):null;
  var weekOk=weekPct!=null&&parseFloat(weekPct)>=DMG_PCT_TARGET;

  // Period stats: aggregate across multiple weeks/months
  var getPeriodSheets = function() {
    var all = DB.damageSheets.filter(function(s){ return s.cliId===selC; });
    if(period==='week') return all.filter(function(s){ return s.weekStart===wStart; });

      });

              </select>
            </div>

/* SIXT SCHADE TRACKER */
function SixtTracker({user}) {
  if(!DB.sixtStats) DB.sixtStats = [];

  var S = {
    bg:'#0a0a0a', bgCard:'#141414', bgHeader:'#0d0d0d', bgRow1:'#111', bgRow2:'#161616',
    border:'#2a2a2a', borderO:'rgba(255,102,0,.4)',
    orange:'#ff6600', white:'#ffffff', grey:'#888888', greyDk:'#555555',
    green:'#00c851', red:'#ff3333', yellow:'#ffcc00',
    font:"'Aptos','Calibri',sans-serif"
  };

  const MONTHS = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
  const now = new Date();

  const sixtClient = DB.clients.find(function(c){ return c.name&&c.name.toLowerCase().includes('sixt'); })||null;
  const sixtId = sixtClient ? sixtClient.id : -1;
  const allSixtEmps = DB.employees.filter(function(e){ return e.active&&(e.clients||[]).includes(sixtId); });

  var SIXT_LOCS = sixtClient
    ? (sixtClient.locations||[]).filter(function(l){ return l.name; }).map(function(l){
        return {name:l.name, branchNr:l.branchNr||'', drTarget:l.drTarget!=null?l.drTarget:20, hpTarget:l.hpTarget!=null?l.hpTarget:10};
      })
    : [{name:'Amsterdam Centraal',branchNr:'',drTarget:20,hpTarget:10}];

  // Which employees are qualified for a given location
  var empsForLoc = function(locName) {
    return allSixtEmps.filter(function(e) {
      if(empSearch.trim()&&!e.name.toLowerCase().includes(empSearch.trim().toLowerCase())) return false;
      if(!e.clientLocs||!e.clientLocs[sixtId]||e.clientLocs[sixtId].length===0) return true;
      return e.clientLocs[sixtId].includes(locName);
    });
  };

  const [period,  setPeriod]  = React.useState('month');
  const [selYear, setSelYear] = React.useState(now.getFullYear());
  const [selMonth,setSelMonth]= React.useState(now.getMonth());
  const [selQ,    setSelQ]    = React.useState(Math.floor(now.getMonth()/3));
  const [selLoc,  setSelLoc]  = React.useState('all');
  const [tick,    setTick]    = React.useState(0);
  const [empSearch, setEmpSearch] = React.useState('');
  const canEdit = ['admin','planner'].includes(user.role);

  const scopeMonths = function() {
    if(period==='month'||period==='week') return [{y:selYear,m:selMonth}];
    if(period==='quarter') {
      var q=selQ;

  const mkey = function(y,m){ return y+'-'+(m<10?'0'+m:m); };

  const getRec = function(y,m,empId,locName) {
    var key = mkey(y,m);
    var rec = DB.sixtStats.find(function(r){ return r.key===key&&r.empId===empId&&r.loc===locName; });
    if(!rec){
      rec = {key:key,empId:empId,loc:locName,checkins:0,detRate:'',highDDR:''};
      DB.sixtStats.push(rec);
    }
    return rec;
  };

  const updateRec = function(y,m,empId,locName,field,val) {

  const stepPct = function(y,m,empId,locName,field,dir) {
    var rec = getRec(y,m,empId,locName);
    var cur = parseFloat(String(rec[field]||'0').replace(',','.').replace('%',''));
    if(isNaN(cur)) cur=0;
    var next = Math.max(0, Math.round((cur + dir*0.1)*10)/10);
    rec[field] = next.toFixed(1).replace('.',',')+'%';
    lsSave(); setTick(function(t){ return t+1; });

    else{const i=DB.clients.findIndex(c=>c.id===form.id);DB.clients[i]={...DB.clients[i],...obj};}
    lsSave(); setList([...DB.clients.filter(c=>!c.archived)]); setMod(null);
  };

  const delC=i=>setF({...form,contacts:form.contacts.filter((_,j)=>j!==i)});
  const updL=(i,k,v)=>{const a=[...form.locations];a[i]={...a[i],[k]:['targetPerDay','dmgPerShift','dmgWeekPct','drTarget','hpTarget'].includes(k)?parseFloat(v)||0:v};setF({...form,locations:a})};
  const delL=i=>setF({...form,locations:form.locations.filter((_,j)=>j!==i)});

  const delFlash=i=>setF({...form,flashcards:form.flashcards.filter((_,j)=>j!==i)});

            <span className={`badge ${sel.type==='autoverhuur'?'bpk':'bb'}`}>{sel.type}</span>
            {canEdit&&<button className="btn btn-p btn-sm" onClick={()=>{setF({...sel,contacts:sel.contacts?.map(x=>({...x}))||[],locations:(sel.locations||[]).map(x=>({...x})),flashcards:(sel.flashcards||[]).map(x=>({...x})),documents:(sel.documents||[]).map(x=>({...x}))});setMod('edit')}}><Ic d={I.edit} s={11}/>Bewerken</button>}
