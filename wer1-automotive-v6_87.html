// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
//  HR MODULE \u2014 WER1 IMS v6
//  Tabs: KPI Dashboard | Gesprekken | Verzuim | Aanwezigheid | Competenties
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function HRModule({user}) {
  var isAdmin = ['admin','planner'].includes(user.role);
  var [tab, setTab]       = React.useState('kpi');
  var [fEmp, setFEmp]     = React.useState('');
  var [fCli, setFCli]     = React.useState('');
  var [fMgr, setFMgr]     = React.useState('');
  var [fYear, setFYear]   = React.useState(new Date().getFullYear());
  var [fMonth, setFMonth] = React.useState(-1); // -1 = heel jaar
  var [tick, setTick]     = React.useState(0);

  // \u2500\u2500 DB init \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  if(!DB.hrConversations) DB.hrConversations = [];
  if(!DB.hrAbsence)       DB.hrAbsence = [];
  if(!DB.hrAttendance)    DB.hrAttendance = [];
  if(!DB.hrSkills)        DB.hrSkills = [];
  if(!DB._id.hrConv)      DB._id.hrConv = 1;
  if(!DB._id.hrAbs)       DB._id.hrAbs  = 1;
  if(!DB._id.hrAtt)       DB._id.hrAtt  = 1;
  if(!DB._id.hrSkill)     DB._id.hrSkill = 1;

  var save = function() { lsSave(); setTick(function(x){return x+1;}); };

  // \u2500\u2500 Helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var activeEmps = DB.employees.filter(function(e){ return e.active; });
  var allMgrs = DB.employees.filter(function(e){ return e.active && (e.roles||[]).some(function(r){ return r.toLowerCase().includes('coord') || r.toLowerCase().includes('manager') || r.toLowerCase().includes('beheer'); }); });

  var filteredEmps = activeEmps.filter(function(e){
    if(fEmp && e.id !== parseInt(fEmp)) return false;
    if(fCli && !(e.clients||[]).includes(parseInt(fCli))) return false;
    if(fMgr && (e.managerId||'') !== fMgr) return false;
    return true;
  });

  var inPeriod = function(dateStr) {
    if(!dateStr) return false;
    var y = parseInt(dateStr.slice(0,4));
    var m = parseInt(dateStr.slice(5,7)) - 1;
    if(y !== fYear) return false;
    if(fMonth >= 0 && m !== fMonth) return false;
    return true;
  };

  var MONTHS = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];

  // \u2500\u2500 Colors \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var C = {
    bg:'var(--bg)', bg2:'var(--bg2)', bg3:'var(--bg3)',
    accent:'var(--accent)', text:'var(--text)', text2:'var(--text2)', text3:'var(--text3)',
    border:'var(--border)', green:'var(--green)', danger:'var(--danger)',
    warn:'#f59e0b', purple:'var(--purple)'
  };

  var cardS = {background:C.bg2, border:'1px solid '+C.border, borderRadius:12, padding:16, marginBottom:12};

  // \u2500\u2500 Filter bar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var filterBar = (
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14,alignItems:'center'}}>
      <select value={fEmp} onChange={function(e){setFEmp(e.target.value);}} style={{background:C.bg3,border:'1px solid '+C.border,borderRadius:7,padding:'6px 10px',color:C.text,fontSize:12}}>
        <option value="">Alle medewerkers</option>
        {activeEmps.map(function(e){ return <option key={e.id} value={e.id}>{e.name}</option>; })}
      </select>
      <select value={fCli} onChange={function(e){setFCli(e.target.value);}} style={{background:C.bg3,border:'1px solid '+C.border,borderRadius:7,padding:'6px 10px',color:C.text,fontSize:12}}>
        <option value="">Alle klanten</option>
        {DB.clients.filter(function(cl){return !cl.archived;}).map(function(cl){ return <option key={cl.id} value={cl.id}>{cl.name}</option>; })}
      </select>
      <select value={fMgr} onChange={function(e){setFMgr(e.target.value);}} style={{background:C.bg3,border:'1px solid '+C.border,borderRadius:7,padding:'6px 10px',color:C.text,fontSize:12}}>
        <option value="">Alle leidinggevenden</option>
        {allMgrs.map(function(m){ return <option key={m.id} value={String(m.id)}>{m.name}</option>; })}
      </select>
      <select value={fYear} onChange={function(e){setFYear(parseInt(e.target.value));}} style={{background:C.bg3,border:'1px solid '+C.border,borderRadius:7,padding:'6px 10px',color:C.text,fontSize:12}}>
        {[2024,2025,2026,2027].map(function(y){ return <option key={y} value={y}>{y}</option>; })}
      </select>
      <select value={fMonth} onChange={function(e){setFMonth(parseInt(e.target.value));}} style={{background:C.bg3,border:'1px solid '+C.border,borderRadius:7,padding:'6px 10px',color:C.text,fontSize:12}}>
        <option value={-1}>Heel jaar</option>
        {MONTHS.map(function(m,i){ return <option key={i} value={i}>{m}</option>; })}
      </select>
    </div>
  );

  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  //  TAB: KPI DASHBOARD
  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  var kpiContent = (function() {
    var empStats = filteredEmps.map(function(e) {
      var absences = DB.hrAbsence.filter(function(a){ return a.empId===e.id && inPeriod(a.startDate); });
      var conversations = DB.hrConversations.filter(function(c){ return c.empId===e.id && inPeriod(c.date); });
      var lates = DB.hrAttendance.filter(function(a){ return a.empId===e.id && a.late && inPeriod(a.date); });
      var noShows = DB.hrAttendance.filter(function(a){ return a.empId===e.id && a.noShow && inPeriod(a.date); });
      var absDays = absences.reduce(function(s,a){ return s+(a.days||0); }, 0);
      var lastConv = conversations.length ? conversations[conversations.length-1] : null;
      var avgScore = conversations.filter(function(c){return c.score;}).length ?
        (conversations.filter(function(c){return c.score;}).reduce(function(s,c){return s+(c.score||0);},0) /
         conversations.filter(function(c){return c.score;}).length).toFixed(1) : null;
      var alerts = [];
      if(absences.length >= 3) alerts.push({type:'warn', msg: absences.length+' ziekmeldingen'});
      if(lates.length >= 3) alerts.push({type:'warn', msg: lates.length+'x te laat'});
      if(noShows.length >= 1) alerts.push({type:'danger', msg: noShows.length+'x no-show'});
      return { emp:e, absences:absences.length, absDays:absDays, conversations:conversations.length,
               lates:lates.length, noShows:noShows.length, avgScore:avgScore, lastConv:lastConv, alerts:alerts };
    });

    // Top/bottom performers by avg score
    var scored = empStats.filter(function(s){return s.avgScore!==null;});
    scored.sort(function(a,b){return parseFloat(b.avgScore)-parseFloat(a.avgScore);});

    // KPI totals
    var totAbs = empStats.reduce(function(s,e){return s+e.absences;},0);
    var totDays = empStats.reduce(function(s,e){return s+e.absDays;},0);
    var totLate = empStats.reduce(function(s,e){return s+e.lates;},0);
    var totAlerts = empStats.filter(function(e){return e.alerts.length>0;}).length;

    var kpiCard = function(label, value, sub, color) {
      return (
        <div style={{background:C.bg2,border:'1px solid '+C.border,borderRadius:12,padding:'16px 20px',flex:1,minWidth:140}}>
          <div style={{fontSize:11,color:C.text3,marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:.5}}>{label}</div>
          <div style={{fontSize:32,fontWeight:900,color:color||C.accent,fontFamily:"'Aptos','Calibri',sans-serif"}}>{value}</div>
          {sub&&<div style={{fontSize:11,color:C.text3,marginTop:4}}>{sub}</div>}
        </div>
      );
    };

    return (
      <div>
        {filterBar}
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
          {kpiCard('Ziekmeldingen', totAbs, totDays+' verzuimdagen', C.warn)}
          {kpiCard('Te laat', totLate, 'registraties', '#f59e0b')}
          {kpiCard('Signalen', totAlerts, 'medewerkers met &#9888;\ufe0f', C.danger)}
          {kpiCard('Medewerkers', filteredEmps.length, 'gefilterd', C.accent)}
        </div>

        {totAlerts > 0 && (
          <div style={Object.assign({},cardS,{marginBottom:16,borderColor:'rgba(239,68,68,.4)'})}>
            <div style={{fontWeight:700,color:C.danger,marginBottom:10,fontSize:14}}>&#9888;&#65039; Signalering</div>
            {empStats.filter(function(s){return s.alerts.length>0;}).map(function(s){
              return (
                <div key={s.emp.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid '+C.border}}>
                  <div style={{fontWeight:700,minWidth:150,color:C.text}}>{s.emp.name}</div>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                    {s.alerts.map(function(a,i){
                      return <span key={i} style={{background:a.type==='danger'?'rgba(239,68,68,.15)':'rgba(245,158,11,.15)',color:a.type==='danger'?C.danger:C.warn,borderRadius:20,padding:'3px 10px',fontSize:11,fontWeight:700}}>{a.msg}</span>;
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div style={cardS}>
            <div style={{fontWeight:700,color:C.accent,marginBottom:10,fontSize:13}}>&#127942; Top performers</div>
            {scored.slice(0,5).map(function(s,i){
              return (
                <div key={s.emp.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid '+C.border}}>
                  <span style={{color:C.text,fontSize:12}}>{i+1}. {s.emp.name}</span>
                  <span style={{fontWeight:800,color:C.green,fontSize:14}}>{s.avgScore}</span>
                </div>
              );
            })}
            {scored.length===0&&<div style={{color:C.text3,fontSize:12,fontStyle:'italic'}}>Nog geen beoordelingen</div>}
          </div>
          <div style={cardS}>
            <div style={{fontWeight:700,color:C.warn,marginBottom:10,fontSize:13}}>&#128202; Verzuim ranking</div>
            {empStats.filter(function(s){return s.absences>0;}).sort(function(a,b){return b.absDays-a.absDays;}).slice(0,5).map(function(s){
              return (
                <div key={s.emp.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid '+C.border}}>
                  <span style={{color:C.text,fontSize:12}}>{s.emp.name}</span>
                  <span style={{fontWeight:700,color:C.warn,fontSize:13}}>{s.absDays}d / {s.absences}x</span>
                </div>
              );
            })}
            {empStats.every(function(s){return s.absences===0;})&&<div style={{color:C.text3,fontSize:12,fontStyle:'italic'}}>Geen verzuim geregistreerd</div>}
          </div>
        </div>

        <div style={cardS}>
          <div style={{fontWeight:700,color:C.text,marginBottom:10,fontSize:13}}>Medewerker overzicht</div>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
              <thead>
                <tr style={{background:C.bg3}}>
                  {['Medewerker','Contract','Klant','Gesprekken','Beoordeling','Ziekmeld.','Verz.dagen','Te laat','Signalen'].map(function(h){
                    return <th key={h} style={{padding:'8px 10px',textAlign:'left',color:C.accent,fontWeight:700,fontSize:11,borderBottom:'1px solid '+C.border,whiteSpace:'nowrap'}}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {empStats.map(function(s,i){
                  return (
                    <tr key={s.emp.id} style={{background:i%2===0?C.bg2:'rgba(12,112,117,.07)',borderBottom:'1px solid '+C.border}}>
                      <td style={{padding:'8px 10px',fontWeight:700,color:C.text,whiteSpace:'nowrap'}}>{s.emp.name}<br/><span style={{fontSize:10,color:C.accent,fontFamily:'monospace'}}>{s.emp.staffNr||''}</span></td>
                      <td style={{padding:'8px 10px',color:C.text3,fontSize:11}}>{s.emp.contractType||'&mdash;'}</td>
                      <td style={{padding:'8px 10px',color:C.text3,fontSize:11}}>{(s.emp.clients||[]).map(function(cid){var cl=DB.clients.find(function(x){return x.id===cid;});return cl?cl.name:'';}).filter(Boolean).join(', ')||'&mdash;'}</td>
                      <td style={{padding:'8px 10px',textAlign:'center',color:C.text}}>{s.conversations}</td>
                      <td style={{padding:'8px 10px',textAlign:'center',fontWeight:700,color:s.avgScore?C.green:C.text3}}>{s.avgScore||'&mdash;'}</td>
                      <td style={{padding:'8px 10px',textAlign:'center',color:s.absences>=3?C.danger:s.absences>0?C.warn:C.text3,fontWeight:s.absences>=3?700:400}}>{s.absences}</td>
                      <td style={{padding:'8px 10px',textAlign:'center',color:s.absDays>10?C.danger:C.text3}}>{s.absDays}</td>
                      <td style={{padding:'8px 10px',textAlign:'center',color:s.lates>=3?C.warn:C.text3,fontWeight:s.lates>=3?700:400}}>{s.lates}</td>
                      <td style={{padding:'8px 10px'}}>{s.alerts.map(function(a,i){return <span key={i} style={{color:a.type==='danger'?C.danger:C.warn,fontSize:12}}>&#9888;&#65039; </span>;})}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  })();

  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  //  TAB: GESPREKKEN
  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  var ConvTab = (function() {
    var [showForm, setShowForm] = React.useState(false);
    var [editId, setEditId]     = React.useState(null);
    var blank = function() { return {empId:'',date:TODAY,type:'voortgang',score:'',kpi:'',strengths:'',improvements:'',training:'',actions:'',nextDate:'',workAttitude:'',teamwork:'',customerFocus:'',reliability:'',autonomy:'',managerId:''}; };
    var [form, setForm] = React.useState(blank);

    var convs = DB.hrConversations.filter(function(c){
      if(fEmp && c.empId!==parseInt(fEmp)) return false;
      if(!inPeriod(c.date)) return false;
      return true;
    }).sort(function(a,b){return b.date.localeCompare(a.date);});

    var openAdd = function() { setForm(blank()); setEditId(null); setShowForm(true); };
    var openEdit = function(c) { setForm(Object.assign({},c,{score:c.score||''})); setEditId(c.id); setShowForm(true); };
    var saveConv = function() {
      if(!form.empId||!form.date) { alert('Medewerker en datum zijn verplicht.'); return; }
      var obj = Object.assign({},form,{empId:parseInt(form.empId),score:form.score?parseFloat(form.score):null});
      if(editId) { var i=DB.hrConversations.findIndex(function(x){return x.id===editId;}); if(i>=0) DB.hrConversations[i]=Object.assign({},DB.hrConversations[i],obj); }
      else { DB.hrConversations.push(Object.assign({id:DB._id.hrConv++},obj)); }
      save(); setShowForm(false);
    };
    var del = function(id) { if(!confirm('Verwijder gesprek?')) return; DB.hrConversations.splice(DB.hrConversations.findIndex(function(x){return x.id===id;}),1); save(); };

    var TYPES = ['voortgang','beoordeling','verzuim','functionering','exitgesprek','anders'];
    var inp = function(label, key, type) {
      return (
        <div className="fg">
          <label style={{fontSize:11}}>{label}</label>
          <input type={type||'text'} value={form[key]||''} onChange={function(e){setForm(Object.assign({},form,{[key]:e.target.value}));}}/>
        </div>
      );
    };
    var txta = function(label, key) {
      return (
        <div className="fg" style={{gridColumn:'1/-1'}}>
          <label style={{fontSize:11}}>{label}</label>
          <textarea value={form[key]||''} onChange={function(e){setForm(Object.assign({},form,{[key]:e.target.value}));}} rows={2} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,padding:'6px 10px',color:'var(--text)',fontFamily:'var(--fb)',width:'100%',resize:'vertical'}}/>
        </div>
      );
    };
    var slider = function(label, key) {
      var val = parseInt(form[key]||0);
      var color = val>=4?'#00e87a':val>=3?'#0F969C':val>=2?'#f59e0b':'#ef4444';
      return (
        <div className="fg">
          <label style={{fontSize:11}}>{label} <span style={{fontWeight:800,color:color}}>{val}/5</span></label>
          <input type="range" min={0} max={5} value={val} onChange={function(e){setForm(Object.assign({},form,{[key]:e.target.value}));}} style={{width:'100%'}}/>
        </div>
      );
    };

    return (
      <div>
        {filterBar}
        {isAdmin&&<button className="btn btn-p btn-sm" onClick={openAdd} style={{marginBottom:14}}>+ Gesprek toevoegen</button>}

        {showForm&&(
          <div style={Object.assign({},cardS,{borderColor:'rgba(15,150,156,.4)',marginBottom:16})}>
            <div style={{fontWeight:700,fontSize:14,color:C.accent,marginBottom:12}}>{editId?'Gesprek bewerken':'Nieuw gesprek'}</div>
            <div className="fgrid">
              <div className="fg"><label style={{fontSize:11}}>Medewerker *</label>
                <select value={form.empId} onChange={function(e){setForm(Object.assign({},form,{empId:e.target.value}));}}>
                  <option value="">Kies medewerker</option>
                  {activeEmps.map(function(e){return <option key={e.id} value={e.id}>{e.name}</option>;})}
                </select>
              </div>
              {inp('Datum *','date','date')}
              <div className="fg"><label style={{fontSize:11}}>Type gesprek</label>
                <select value={form.type||'voortgang'} onChange={function(e){setForm(Object.assign({},form,{type:e.target.value}));}}>
                  {TYPES.map(function(t){return <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>;})}
                </select>
              </div>
              <div className="fg"><label style={{fontSize:11}}>Beoordeling (1-10)</label>
                <input type="number" min={1} max={10} step={0.5} value={form.score||''} onChange={function(e){setForm(Object.assign({},form,{score:e.target.value}));}}/>
              </div>
              <div className="fg"><label style={{fontSize:11}}>Leidinggevende</label>
                <select value={form.managerId||''} onChange={function(e){setForm(Object.assign({},form,{managerId:e.target.value}));}}>
                  <option value="">&mdash; Kies &mdash;</option>
                  {activeEmps.filter(function(e){return (e.roles||[]).some(function(r){return r.toLowerCase().includes('coord')||r.toLowerCase().includes('manager')||r.toLowerCase().includes('beheer');});}).map(function(m){return <option key={m.id} value={m.id}>{m.name}</option>;})}
                </select>
              </div>
              {inp('Volgende evaluatie','nextDate','date')}
              {txta('Doelstellingen / KPI\'s','kpi')}
              {txta('Sterke punten','strengths')}
              {txta('Verbeterpunten','improvements')}
              {txta('Opleidingen / trainingen','training')}
              {txta('Afspraken & actiepunten','actions')}
            </div>
            <div style={{fontWeight:600,color:C.text2,fontSize:12,margin:'12px 0 8px'}}>Gedrag & houding (0-5)</div>
            <div className="fgrid">
              {slider('Werkhouding','workAttitude')}
              {slider('Samenwerking','teamwork')}
              {slider('Klantgerichtheid','customerFocus')}
              {slider('Betrouwbaarheid','reliability')}
              {slider('Zelfstandigheid','autonomy')}
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <button className="btn btn-p btn-sm" onClick={saveConv}>Opslaan</button>
              <button className="btn btn-s btn-sm" onClick={function(){setShowForm(false);}}>Annuleren</button>
            </div>
          </div>
        )}

        {convs.length===0&&<div style={{color:C.text3,fontStyle:'italic',fontSize:13}}>Geen gesprekken gevonden.</div>}
        {convs.map(function(cv){
          var em=DB.employees.find(function(e){return e.id===cv.empId;});
          var mgr=cv.managerId?DB.employees.find(function(e){return e.id===parseInt(cv.managerId);}):null;
          var scoreColor=cv.score?cv.score>=8?C.green:cv.score>=6?C.accent:cv.score>=4?C.warn:C.danger:C.text3;
          return (
            <div key={cv.id} style={cardS}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:C.text}}>{em?em.name:'Onbekend'}</div>
                  <div style={{fontSize:11,color:C.text3,marginTop:2}}>{fmtDate(cv.date)} &middot; <span style={{color:C.accent,textTransform:'capitalize'}}>{cv.type}</span>{mgr?' &middot; lgv: '+mgr.name:''}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  {cv.score&&<span style={{fontWeight:900,fontSize:22,color:scoreColor,fontFamily:"'Aptos','Calibri',sans-serif"}}>{cv.score}<span style={{fontSize:12,color:C.text3}}>/10</span></span>}
                  {isAdmin&&<button className="btn btn-s btn-sm" onClick={function(){openEdit(cv);}}>Bewerken</button>}
                  {isAdmin&&<button className="btn btn-sm" style={{background:'rgba(239,68,68,.15)',color:C.danger,border:'none',cursor:'pointer',borderRadius:6,padding:'4px 8px',fontSize:11}} onClick={function(){del(cv.id);}}>Verwijderen</button>}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:8}}>
                {cv.kpi&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Doelstellingen</div><div style={{fontSize:12,color:C.text}}>{cv.kpi}</div></div>}
                {cv.strengths&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Sterke punten</div><div style={{fontSize:12,color:C.green}}>{cv.strengths}</div></div>}
                {cv.improvements&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Verbeterpunten</div><div style={{fontSize:12,color:C.warn}}>{cv.improvements}</div></div>}
                {cv.actions&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Actiepunten</div><div style={{fontSize:12,color:C.text}}>{cv.actions}</div></div>}
                {cv.training&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Trainingen</div><div style={{fontSize:12,color:C.accent}}>{cv.training}</div></div>}
                {cv.nextDate&&<div><div style={{fontSize:10,color:C.text3,fontWeight:600,textTransform:'uppercase',marginBottom:2}}>Volgende evaluatie</div><div style={{fontSize:12,color:C.text}}>{fmtDate(cv.nextDate)}</div></div>}
              </div>
              {(cv.workAttitude||cv.teamwork||cv.customerFocus||cv.reliability||cv.autonomy)&&(
                <div style={{display:'flex',gap:10,marginTop:10,flexWrap:'wrap'}}>
                  {[['Werkhouding',cv.workAttitude],['Samenwerking',cv.teamwork],['Klantgerichtheid',cv.customerFocus],['Betrouwbaarheid',cv.reliability],['Zelfstandigheid',cv.autonomy]].map(function(pair){
                    if(!pair[1]) return null;
                    var v=parseInt(pair[1]);
                    var col=v>=4?C.green:v>=3?C.accent:v>=2?C.warn:C.danger;
                    return <span key={pair[0]} style={{fontSize:11,color:C.text3}}>{pair[0]}: <span style={{fontWeight:700,color:col}}>{v}/5</span></span>;
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  })();

  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  //  TAB: VERZUIM
  // \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  var AbsTab = (function() {
    var [showForm, setShowForm] = React.useState(false);
    var [editId, setEditId]     = React.useState(null);
    var blank = function() { return {empId:'',startDate:TODAY,endDate:'',days:'',type:'kort',reason:'',contactMoments:'',arbo:false}; };

    var absences = DB.hrAbsence.filter(function(a){
      if(fEmp && a.empId!==parseInt(fEmp)) return false;
      if(!inPeriod(a.startDate)) return false;
      return true;
    }).sort(function(a,b){return b.startDate.localeCompare(a.startDate);});

    var openAdd = function() { setForm(blank()); setEditId(null); setShowForm(true); };
    var openEdit = function(a) { setForm(Object.assign({},a,{arbo:a.arbo||false})); setEditId(a.id); setShowForm(true); };
    var saveAbs = function() {
      if(!form.empId||!form.startDate) { alert('Medewerker en startdatum zijn verplicht.'); return; }
      var days = form.days ? parseInt(form.days) : (form.endDate ? Math.ceil((new Date(form.endDate)-new Date(form.startDate))/(1000*60*60*24))+1 : null);
      var obj = Object.assign({},form,{empId:parseInt(form.empId),days:days});
      if(editId) { var i=DB.hrAbsence.findIndex(function(x){return x.id===editId;}); if(i>=0) DB.hrAbsence[i]=Object.assign({},DB.hrAbsence[i],obj); }
      else { DB.hrAbsence.push(Object.assign({id:DB._id.hrAbs++},obj)); }
      save(); setShowForm(false);
    };
    var del = function(id) { if(!confirm('Verwijder ziekmelding?')) return; DB.hrAbsence.splice(DB.hrAbsence.findIndex(function(x){return x.id===id;}),1); save(); };

    var ABS_TYPES = ['kort','lang','frequent','zwangerschap','arbeidsongeval','anders'];

    return (
      <div>
        {filterBar}
        {isAdmin&&<button className="btn btn-p btn-sm" onClick={openAdd} style={{marginBottom:14}}>+ Ziekmelding toevoegen</button>}
        {showForm&&(
          <div style={Object.assign({},cardS,{borderColor:'rgba(245,158,11,.4)',marginBottom:16})}>
            <div style={{fontWeight:700,fontSize:14,color:C.warn,marginBottom:12}}>{editId?'Ziekmelding bewerken':'Nieuwe ziekmelding'}</div>
            <div className="fgrid">
              <div className="fg"><label style={{fontSize:11}}>Medewerker *</label>

  var exportHRExcel = function() {
    if(typeof XLSX === "undefined") { alert("XLSX library niet geladen"); return; }
    var wb = XLSX.utils.book_new();

    // \u2500\u2500 Sheet 1: KPI Overzicht \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    var kpiRows = [["Medewerker","Personeelsnr","Contract","Klant","Gesprekken","Gem. score",
      "Ziekmeldingen","Verz.dagen","Te laat","Signalen"]];
    activeEmps.forEach(function(e) {
      var absences = (DB.hrAbsence||[]).filter(function(a){return a.empId===e.id;});
      var convs    = (DB.hrConversations||[]).filter(function(cv){return cv.empId===e.id;});
      var lates    = (DB.hrAttendance||[]).filter(function(a){return a.empId===e.id&&a.late;});
      var absDays  = absences.reduce(function(s,a){return s+(a.days||0);},0);
      var scored   = convs.filter(function(cv){return cv.score;});
      var avgScore = scored.length?(scored.reduce(function(s,cv){return s+(cv.score||0);},0)/scored.length).toFixed(1):"";
      var alerts   = [];
      if(absences.length>=3) alerts.push(absences.length+"x ziek");
      if(lates.length>=3)    alerts.push(lates.length+"x te laat");
      var cliNames = (e.clients||[]).map(function(cid){var cl=DB.clients.find(function(x){return x.id===cid;});return cl?cl.name:"";}).filter(Boolean).join(", ");
      kpiRows.push([e.name, e.staffNr||"", e.contractType||"loondienst", cliNames,
        convs.length, avgScore, absences.length, absDays, lates.length, alerts.join("; ")]);
    });
    var wsKpi = XLSX.utils.aoa_to_sheet(kpiRows);
    wsKpi["!cols"] = [20,14,12,20,12,10,14,12,10,24].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb, wsKpi, "KPI Overzicht");

    // \u2500\u2500 Sheet 2: Gesprekken \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    var convRows = [["Datum","Medewerker","Personeelsnr","Type","Score(1-10)","Leidinggevende",
      "Doelstellingen","Sterke punten","Verbeterpunten","Trainingen","Actiepunten",
      "Volgende evaluatie","Werkhouding(0-5)","Samenwerking","Klantgerichtheid","Betrouwbaarheid","Zelfstandigheid"]];
    (DB.hrConversations||[]).sort(function(a,b){return b.date.localeCompare(a.date);}).forEach(function(cv) {
      var em  = DB.employees.find(function(e){return e.id===cv.empId;});
      var mgr = cv.managerId?DB.employees.find(function(e){return e.id===parseInt(cv.managerId);}):null;
      convRows.push([
        fmtDate(cv.date), em?em.name:"", em?em.staffNr||"":"",
        cv.type||"", cv.score||"", mgr?mgr.name:"",
        cv.kpi||"", cv.strengths||"", cv.improvements||"",
        cv.training||"", cv.actions||"",
        fmtDate(cv.nextDate||""),
        cv.workAttitude||"", cv.teamwork||"", cv.customerFocus||"",
        cv.reliability||"", cv.autonomy||""
      ]);
    });
    var wsConv = XLSX.utils.aoa_to_sheet(convRows);
    wsConv["!cols"] = [12,20,12,14,10,20,30,30,30,30,30,14,14,14,14,14,14].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb, wsConv, "Gesprekken");

    // \u2500\u2500 Sheet 3: Verzuim \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    var absRows = [["Ziekmelding","Herstel","Dagen","Medewerker","Type","Reden","Contactmomenten","Arbo"]];
    (DB.hrAbsence||[]).sort(function(a,b){return b.startDate.localeCompare(a.startDate);}).forEach(function(a) {
      var em = DB.employees.find(function(e){return e.id===a.empId;});
      absRows.push([fmtDate(a.startDate), fmtDate(a.endDate||""), a.days||"",
        em?em.name:"", a.type||"", a.reason||"", a.contactMoments||"", a.arbo?"Ja":"Nee"]);
    });
    var wsAbs = XLSX.utils.aoa_to_sheet(absRows);
    wsAbs["!cols"] = [12,12,8,20,12,20,30,8].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb, wsAbs, "Verzuim");

    // \u2500\u2500 Sheet 4: Aanwezigheid \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
    var attRows = [["Datum","Medewerker","Te laat","Minuten","Reden te laat","No-show","Vroeg weg","Reden vroeg weg"]];
    (DB.hrAttendance||[]).sort(function(a,b){return b.date.localeCompare(a.date);}).forEach(function(a) {
      var em = DB.employees.find(function(e){return e.id===a.empId;});
      attRows.push([fmtDate(a.date), em?em.name:"",
        a.late?"Ja":"Nee", a.lateMinutes||"", a.lateReason||"",
        a.noShow?"Ja":"Nee", a.earlyLeave?"Ja":"Nee", a.earlyReason||""]);
    });
    var wsAtt = XLSX.utils.aoa_to_sheet(attRows);
    wsAtt["!cols"] = [12,20,8,8,25,8,8,25].map(function(w){return{wch:w};});
    XLSX.utils.book_append_sheet(wb, wsAtt, "Aanwezigheid");

    XLSX.writeFile(wb, "WER1_HR_Export_"+new Date().toISOString().slice(0,10)+".xlsx");
  };

  return (
    <div style={{padding:'0 0 40px',background:RB.bg,minHeight:'100vh',marginTop:-8}}>
      <div style={{background:'linear-gradient(135deg,'+RB.bg+' 0%,'+RB.bg2+' 100%)',borderBottom:'2px solid '+RB.gold,padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:RB.gold}}>HR &amp; Personeel</div>
          <div style={{fontSize:11,color:RB.text3,marginTop:2}}>Prestaties, gesprekken, verzuim &amp; competenties</div>
        </div>
        <button onClick={exportHRExcel} style={{background:'transparent',border:'1px solid '+RB.gold,borderRadius:8,padding:'8px 16px',color:RB.gold,fontWeight:700,fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
          &#11015; Excel export
        </button>
      </div>
      <div style={{display:'flex',background:RB.bg2,borderBottom:'2px solid '+RB.gold,overflowX:'auto',paddingLeft:8}}>
        {tabs.map(function(t){var a=tab===t.id;return <button key={t.id} onClick={function(){setTab(t.id);}} style={{padding:'11px 18px',background:'none',border:'none',borderBottom:a?'3px solid '+RB.gold:'3px solid transparent',color:a?RB.gold:RB.text3,fontWeight:a?700:500,cursor:'pointer',whiteSpace:'nowrap',fontSize:13,fontFamily:'var(--fb)'}}>{t.label}</button>;})}
      </div>
      <div style={{padding:'16px 16px'}}>
        {tab==='kpi'&&kpiContent}
        {tab==='conversations'&&ConvTab}
        {tab==='absence'&&AbsTab}
        {tab==='attendance'&&AttTab}
        {tab==='competencies'&&CompTab}
      </div>
    </div>
  );
}


function Analytics({user}) {
  var [aTab, setATab]   = React.useState('emp');
  var [period, setPeriod] = React.useState('maand');
  var [selEmp, setSelEmp] = React.useState('');
  var [selCli, setSelCli] = React.useState('');
  var [cmpMode, setCmpMode] = React.useState(false);
  var now = new Date();
  var MN = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  var getPK = function(p) {
    var r=[],yr=now.getFullYear();
    if(p==='week'){for(var i=6;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');r.push({key:y+'-'+m+'-'+dd,label:['Zo','Ma','Di','Wo','Do','Vr','Za'][d.getDay()]});}}
    else if(p==='maand'){for(var m=0;m<12;m++)r.push({key:yr+'-'+String(m+1).padStart(2,'0'),label:MN[m]});}
    else if(p==='kwartaal'){for(var q=0;q<4;q++)r.push({key:yr+'-Q'+(q+1),label:'Q'+(q+1)});}
    else{for(var y=yr-4;y<=yr;y++)r.push({key:String(y),label:String(y)});}
    return r;
  };
  var inKey=function(s,k,p){if(!s)return false;if(p==='week')return s===k;if(p==='maand')return s.startsWith(k);if(p==='kwartaal'){var m=parseInt(s.slice(5,7));return s.startsWith(k.slice(0,4))&&k.endsWith('Q'+Math.ceil(m/3));}return s.startsWith(k);};
  var LineChart=function(props){
    var d=props.data||[],c=props.color||'#0F969C',c2=props.color2||'#f59e0b',s2=props.series2||null;
    var W=380,H=160,pl=38,pr=12,pt=14,pb=30,cw=W-pl-pr,ch=H-pt-pb;
    if(!d.length)return <svg width={W} height={H}><text x={W/2} y={H/2} textAnchor="middle" fill="#2a5060" fontSize={12}>Geen data</text></svg>;
    var all=d.map(function(x){return x.v;});if(s2)s2.forEach(function(x){all.push(x.v);});
    var mV=Math.max.apply(null,all.concat([1]));
    var fx=function(i){return pl+(i/Math.max(d.length-1,1))*cw;};
    var fy=function(v){return pt+ch-(v/mV)*ch;};
    var p1=d.map(function(x,i){return(i===0?'M':'L')+fx(i).toFixed(1)+','+fy(x.v).toFixed(1);}).join(' ');
    var a1=p1+' L'+fx(d.length-1).toFixed(1)+','+(pt+ch)+' L'+pl+','+(pt+ch)+' Z';
    var p2=s2?s2.map(function(x,i){return(i===0?'M':'L')+fx(i).toFixed(1)+','+fy(x.v).toFixed(1);}).join(' '):'';
    return(
      <svg width={W} height={H} style={{overflow:'visible'}}>
        <defs>
          <linearGradient id={'ag'+props.id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.3"/><stop offset="100%" stopColor={c} stopOpacity="0.02"/></linearGradient>
          {s2&&<linearGradient id={'bg'+props.id} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c2} stopOpacity="0.2"/><stop offset="100%" stopColor={c2} stopOpacity="0.02"/></linearGradient>}
        </defs>
        {[0,0.5,1].map(function(f,fi){var yy=pt+ch*(1-f);return <g key={fi}><line x1={pl} y1={yy} x2={pl+cw} y2={yy} stroke="#0d2030" strokeWidth="1"/><text x={pl-4} y={yy+4} textAnchor="end" fill="#2a5060" fontSize="9">{Math.round(mV*f)}</text></g>;})}
        <path d={a1} fill={'url(#ag'+props.id+')'} />
        {s2&&<path d={p2+' L'+fx(s2.length-1).toFixed(1)+','+(pt+ch)+' L'+pl+','+(pt+ch)+' Z'} fill={'url(#bg'+props.id+')'}/>}
        <path d={p1} fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {s2&&<path d={p2} fill="none" stroke={c2} strokeWidth="2" strokeDasharray="5,3" strokeLinecap="round" strokeLinejoin="round"/>}
        {d.map(function(x,i){return <circle key={i} cx={fx(i)} cy={fy(x.v)} r="3.5" fill={c} stroke="#071015" strokeWidth="2"><title>{x.label+': '+x.v}</title></circle>;})}
        {s2&&s2.map(function(x,i){return <circle key={i} cx={fx(i)} cy={fy(x.v)} r="3" fill={c2} stroke="#071015" strokeWidth="2"><title>{x.label+': '+x.v}</title></circle>;})}
        {d.filter(function(_,i){return d.length<=10||i%2===0;}).map(function(x,i){return <text key={i} x={fx(i*(d.length<=10?1:2))} y={H-6} textAnchor="middle" fill="#2a5060" fontSize="9">{x.label}</text>;})}
      </svg>
    );
  };
  var BarChart=function(props){
    var d=props.data||[],c=props.color||'#0F969C',c2=props.color2;
    var W=380,H=160,pl=38,pr=8,pt=14,pb=30,cw=W-pl-pr,ch=H-pt-pb;
    if(!d.length)return <svg width={W} height={H}><text x={W/2} y={H/2} textAnchor="middle" fill="#2a5060" fontSize={12}>Geen data</text></svg>;
    var all=d.map(function(x){return x.v;});if(c2)d.forEach(function(x){if(x.v2)all.push(x.v2);});
    var mV=Math.max.apply(null,all.concat([1]));
    var bw=c2?(cw/d.length)*0.35:(cw/d.length)*0.65,gap=cw/d.length;
    return(

  var scanPlatesFromBase64 = function(b64, onDone) {
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:'Read ALL Dutch license plate numbers visible in this image. Return ONLY the plate numbers separated by commas, nothing else. Format: AB-123-CD. If none visible, return NONE.'}
        ]}]})})
    .then(function(r){return r.json();})
    .then(function(d){ var txt=(d.content&&d.content[0]&&d.content[0].text)||''; onDone(txt.trim()==='NONE'?'':txt.trim()); })
    .catch(function(){ onDone(''); });
  };

  var handlePlateImage = function(file, setF, form) {
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement('canvas');
        var MAX=1200; var scale=Math.min(MAX/img.width,MAX/img.height,1);
        canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        var b64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
        setF(function(prev){ return Object.assign({},prev,{_plateLoading:true}); });
        scanPlatesFromBase64(b64, function(result){
          setF(function(prev){ return Object.assign({},prev,{plate:result||prev.plate,_plateLoading:false}); });
        });
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  var todayI = myInsp.filter(function(i){ return i.date===TODAY; });
  var weekI  = myInsp.filter(function(i){ return wDts.includes(i.date); });
  var roster = DB.roster.filter(function(r){ return r.empId===empUser.empId&&wDts.includes(r.date); });

  var myCli = (emp&&emp.clients||[]).map(function(cid){ return DB.clients.find(function(cl){ return cl.id===cid; }); }).filter(Boolean);
  var activeSel = selC||myCli[0]&&myCli[0].id||null;
  var client = DB.clients.find(function(cl){ return cl.id===activeSel; });

  var fCli = DB.clients.find(function(cl){ return cl.id===parseInt(form.cliId); });
  var isRF = fCli&&fCli.type==='autoverhuur';

  var qualLocs = function(cliId) {
    var cl = DB.clients.find(function(x){ return x.id===cliId; });
    if(!cl||!cl.locations) return [];
    var empLocs = (emp&&emp.clientLocs&&emp.clientLocs[cliId])||[];
    if(empLocs.length===0) return cl.locations;
    return cl.locations.filter(function(l){ return empLocs.includes(l.name); });
  };
  var fLocs = qualLocs(parseInt(form.cliId)||0);

  var openAdd = function() {
    var firstCli = myCli[0];
    var locs = qualLocs(firstCli&&firstCli.id||0);
    setF({empId:empUser.empId,cliId:firstCli&&firstCli.id||'',loc:locs[0]&&locs[0].name||'',date:TODAY,count:1,dmg:0,ret:0,type:'schade',status:'goedgekeurd',notes:'',plate:''});
    setMod(true);
  };

  var save = function() {
    if(!form.cliId||!form.loc||!form.date){ alert('Klant, locatie en datum zijn verplicht.'); return; }
    var obj = {id:nid('insp'),empId:parseInt(form.empId),cliId:parseInt(form.cliId),
      loc:form.loc,date:form.date,type:form.type||'schade',
      count:parseInt(form.count)||1,dmg:parseInt(form.dmg)||0,ret:parseInt(form.ret)||0,
      status:form.status||'goedgekeurd',notes:form.notes||'',plate:form.plate||''};
    DB.inspections.push(obj);
    auditLog(empUser.id,'Inspectie ingevoerd',(DB.clients.find(function(cl){return cl.id===parseInt(form.cliId);})||{}).name||'');
    lsSave(); setMod(false); setTick(function(t){ return t+1; });
  };

  var fOk = parseInt(form.dmg)>=(fLocs.find(function(l){ return l.name===form.loc; })&&fLocs.find(function(l){ return l.name===form.loc; }).dmgPerShift||5);
  var fPct = form.ret>0?((form.dmg/form.ret)*100).toFixed(1):0;

  var brandColor = function(cliId) {
    var cl = DB.clients.find(function(x){ return x.id===cliId; });
    if(!cl) return 'var(--accent)';
    if(cl.name&&cl.name.toLowerCase().includes('sixt')) return '#ff6600';
    if(cl.name&&cl.name.toLowerCase().includes('europcar')) return '#006b3c';
    return 'var(--accent)';
  };

  var initials = (emp&&emp.name||empUser.name).split(' ').map(function(n){ return n[0]; }).join('').slice(0,2).toUpperCase();
  var todayTotal = todayI.reduce(function(s,i){ return s+(i.count||1); },0);
  var weekTotal  = weekI.reduce(function(s,i){ return s+(i.count||1); },0);
  var todayDmg   = todayI.reduce(function(s,i){ return s+(i.dmg||0); },0);

  // Kenteken scan via AI
  var doScanImage = function(file) {
    if(!file) return;
    setPlateLoading(true);
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var MAX = 1200;
        var scale = Math.min(MAX/img.width, MAX/img.height, 1);
        canvas.width  = Math.round(img.width*scale);
        canvas.height = Math.round(img.height*scale);
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        var b64 = canvas.toDataURL('image/jpeg',0.85).split(',')[1];
        fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            model:'claude-sonnet-4-20250514',
            max_tokens:150,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
              {type:'text',text:'Read Dutch license plates in this image. Return ONLY the plate numbers separated by commas. Format: AB-123-CD. If none, return NONE.'}
            ]}]
          })
        })
        .then(function(r){ return r.json(); })
        .then(function(d){
          var txt = (d.content&&d.content[0]&&d.content[0].text)||'';
          var result = txt.trim()==='NONE'?'':txt.trim();
          setPlateLoading(false);
          if(result) setF(function(prev){ return Object.assign({},prev,{plate:result}); });
        })
        .catch(function(){ setPlateLoading(false); });
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

          <div>
            <div style={{fontFamily:"'Aptos',sans-serif",fontSize:14,fontWeight:700,color:'#4a7fd4'}}>Medewerker Portaal</div>
            <div style={{fontSize:11,color:'#445566'}}>{emp&&emp.name||empUser.name}</div>
          </div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          {[['home','🏠','Home'],['inspecties','📋','Inspecties'],['week','📆','Week'],['protocollen','⚡','Protocollen']].map(function(p){
            return <button key={p[0]} onClick={function(){ setPage(p[0]); }} style={{padding:'5px 12px',borderRadius:6,border:'1px solid '+(page===p[0]?'#2d5aa0':'var(--border)'),background:page===p[0]?'rgba(45,90,160,.15)':'transparent',color:page===p[0]?'#4a7fd4':'var(--text2)',fontFamily:"'Aptos',sans-serif",fontWeight:600,fontSize:12,cursor:'pointer'}}>{p[1]} {p[2]}</button>;
          })}
          <button onClick={openAdd} style={{padding:'5px 13px',borderRadius:6,border:'none',background:'#2d5aa0',color:'#fff',fontFamily:"'Aptos',sans-serif",fontWeight:700,fontSize:12,cursor:'pointer'}}>+ Invoeren</button>
          <button onClick={onLogout} style={{padding:'5px 11px',borderRadius:6,border:'1px solid var(--border)',background:'transparent',color:'var(--text3)',fontSize:11,cursor:'pointer'}}>Uitloggen</button>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'20px 24px',maxWidth:900,margin:'0 auto',width:'100%'}}>

        {page==='home'&&(
          <div>
            <div style={{marginBottom:14,fontSize:14,color:'var(--text2)'}}>Goedemiddag, <strong style={{color:'#4a7fd4'}}>{emp&&emp.name.split(' ')[0]||empUser.name}</strong> 👋</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
              {[
                {l:'Vandaag',v:todayTotal,s:'voertuigen',c:'#4a7fd4'},
                {l:'Deze week',v:weekTotal,s:'totaal',c:'#00e87a'},
                {l:'Schades vandaag',v:todayDmg,s:'gevonden',c:todayDmg>=5?'#00e87a':'#f59e0b'},
                {l:'Klanten',v:myCli.length,s:'gekoppeld',c:'#4a7fd4'},
              ].map(function(k){
                return (
                  <div key={k.l} className="kpi">
                    <div className="kl">{k.l}</div>
                    <div className="kv" style={{color:k.c,fontSize:28}}>{k.v}</div>
                    <div className="ks">{k.s}</div>
                  </div>
                );
              })}
            </div>
            <div className="card" style={{marginBottom:12}}>
              <div className="ct">📆 Mijn rooster deze week</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {wDts.map(function(d,i){
                  var r=roster.find(function(x){ return x.date===d; });
                  var isT=d===TODAY;
                  return (
                    <div key={d} style={{flex:'1 0 54px',minWidth:54,background:isT?'rgba(45,90,160,.1)':'var(--bg3)',border:'1px solid '+(isT?'rgba(45,90,160,.4)':'var(--border)'),borderRadius:8,padding:'8px 5px',textAlign:'center'}}>
                      <div style={{fontSize:10,color:isT?'#4a7fd4':'var(--text3)',fontWeight:700,marginBottom:4}}>{WD[i]}<br/>{d.slice(5)}</div>
                      {r?<span className="badge bg" style={{fontSize:9}}>{r.shiftType||SHIFT[r.shift]&&SHIFT[r.shift].l||r.shift}</span>:<span style={{color:'var(--text3)',fontSize:11}}>—</span>}
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="card">
              <div className="ct">Inspecties vandaag
                <button onClick={openAdd} className="btn btn-p btn-sm"><Ic d={I.plus} s={12}/>Invoeren</button>
              </div>
              {todayI.length===0&&<div style={{color:'var(--text3)',fontSize:12,padding:'8px 0'}}>Nog geen inspecties vandaag. Druk op "+ Invoeren" om te beginnen.</div>}
              {todayI.map(function(i){
                var cl=DB.clients.find(function(x){ return x.id===i.cliId; });
                var bc=brandColor(i.cliId);
                return (
                  <div key={i.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid rgba(26,48,80,.25)'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:4,height:36,borderRadius:2,background:bc,flexShrink:0}}/>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{cl&&cl.name}</div>
                        <div style={{fontSize:11,color:'var(--text3)'}}>{i.loc} · <span className="badge bb" style={{fontSize:9}}>{i.type}</span></div>
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:22,fontWeight:800,color:bc}}>{i.count||1}</div>
                      {i.plate&&<div style={{fontSize:10,color:'var(--text3)',fontFamily:'monospace'}}>{i.plate}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {page==='inspecties'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:13}}>
              <div className="st" style={{fontSize:15}}>Mijn inspecties</div>
              <button onClick={openAdd} className="btn btn-p"><Ic d={I.plus} s={13}/>Invoeren</button>
            </div>
            {myInsp.length===0&&<div className="al al-b">Nog geen inspecties geregistreerd.</div>}
            {myInsp.slice().reverse().map(function(i){
              var cl=DB.clients.find(function(x){ return x.id===i.cliId; });
              var bc=brandColor(i.cliId);
              return (
                <div key={i.id} className="card" style={{padding:13,marginBottom:9,borderLeft:'3px solid '+bc}}>
                  <div style={{display:'flex',justifyContent:'space-between',gap:8}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:13,color:bc}}>{cl&&cl.name}</div>
                      <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{i.loc} · {fmtDate(i.date)} · <span className="badge bb" style={{fontSize:9}}>{i.type}</span></div>
                      {i.plate&&<div style={{fontSize:11,fontFamily:'monospace',color:'var(--accent)',marginTop:2}}>{i.plate}</div>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:24,fontWeight:800,color:bc}}>{i.count||1}</div>
                    </div>
                  </div>
                  {cl&&cl.type==='autoverhuur'&&(
                    <div style={{display:'flex',gap:12,marginTop:8,fontSize:12}}>
                      <span style={{color:(i.dmg||0)>=5?'var(--green)':'var(--danger)',fontWeight:600}}>🔍 {i.dmg||0} schades</span>
                      <span style={{color:'var(--text3)'}}>📥 {i.ret||0} returns</span>
                      {(i.ret||0)>0&&<span style={{fontWeight:600}}>→ {((i.dmg/i.ret)*100).toFixed(1)}%</span>}
                    </div>
                  )}
                  <div style={{marginTop:7}}><span className={'badge '+stBadge(i.status)}>{i.status}</span></div>
                </div>
              );
            })}
          </div>
        )}

        {page==='week'&&(
          <div>
            <div className="st" style={{fontSize:15,marginBottom:13}}>📆 Weekstaat — {fmtDate(wDts[0])} t/m {fmtDate(wDts[6])}</div>
            <div className="card">
              <div className="tw"><table>
                <thead><tr><th>Dag</th><th>Klant</th><th>Locatie</th><th>Type</th><th>Voertuigen</th><th>Kenteken</th><th>Status</th></tr></thead>
                <tbody>
                  {wDts.map(function(d){
                    var dayInsp = myInsp.filter(function(i){ return i.date===d; });
                    var isT = d===TODAY;
                    if(dayInsp.length===0){
                      return (
                        <tr key={d} style={{opacity:.5}}>
                          <td style={{fontWeight:600,color:isT?'var(--accent)':'var(--text2)',whiteSpace:'nowrap'}}>{WD[wDts.indexOf(d)]}<br/><span style={{fontSize:9,fontWeight:400}}>{d.slice(5)}</span></td>
                          <td colSpan={6} style={{color:'var(--text3)',fontSize:11,fontStyle:'italic'}}>Geen inspecties</td>
                        </tr>
                      );
                    }
                    return dayInsp.map(function(i,ii){
                      var cl = DB.clients.find(function(x){ return x.id===i.cliId; });
                      var bc = brandColor(i.cliId);
                      return (
                        <tr key={i.id} style={{background:isT?'rgba(45,90,160,.03)':''}}>
                          {ii===0&&<td rowSpan={dayInsp.length} style={{fontWeight:600,color:isT?'var(--accent)':'var(--text2)',verticalAlign:'top',whiteSpace:'nowrap',paddingTop:10}}>
                            {WD[wDts.indexOf(d)]}<br/><span style={{fontSize:9,fontWeight:400}}>{d.slice(5)}</span>
                          </td>}
                          <td><span style={{color:bc,fontWeight:600}}>{cl&&cl.name}</span></td>
                          <td style={{fontSize:11}}>{i.loc}</td>
                          <td><span className="badge bb" style={{fontSize:9}}>{i.type}</span></td>
                          <td style={{textAlign:'center',fontWeight:700,color:bc}}>{i.count||1}</td>
                          <td style={{fontFamily:'monospace',fontSize:11,color:'var(--accent)'}}>{i.plate||'-'}</td>
                          <td><span className={'badge '+stBadge(i.status)} style={{fontSize:9}}>{i.status}</span></td>
                        </tr>
                      );
                    });
                  })}
                </tbody>
              </table></div>
            </div>
          </div>
        )}

        {page==='protocollen'&&(
          <div>
            <div className="st" style={{fontSize:15,marginBottom:13}}>⚡ Protocollen</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:13}}>
              {myCli.map(function(cl){ return (
                <button key={cl.id} onClick={function(){ setSC(cl.id); }} style={{padding:'5px 12px',borderRadius:6,border:'2px solid '+(activeSel===cl.id?brandColor(cl.id):'var(--border)'),background:activeSel===cl.id?'rgba(45,90,160,.08)':'transparent',color:activeSel===cl.id?brandColor(cl.id):'var(--text2)',fontWeight:600,fontSize:12,cursor:'pointer'}}>{cl.name}</button>
              ); })}
            </div>
            {client&&!(client.flashcards&&client.flashcards.length)&&<div className="al al-b">Geen flashcards voor {client.name}.</div>}
            {(client&&client.flashcards||[]).map(function(fc){
              return (
                <div key={fc.id} className="card" style={{borderLeft:'3px solid '+brandColor(client.id)}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:11}}>
                    <div style={{width:30,height:30,borderRadius:7,background:'rgba(45,90,160,.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>⚡</div>
                    <div style={{fontFamily:"'Aptos',sans-serif",fontSize:13,fontWeight:700,color:'var(--accent)'}}>{fc.title}</div>
                  </div>
                  <pre style={{fontSize:12,color:'var(--text2)',whiteSpace:'pre-wrap',fontFamily:'var(--fb)',lineHeight:1.75,background:'rgba(0,0,0,.17)',borderRadius:8,padding:'11px 13px',margin:0}}>{fc.content}</pre>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {modal&&(
        <Modal title="Inspectie invoeren" onClose={function(){ setMod(false); }} onSave={save}>
          <div className="fgrid">
            <div className="fg"><label>Klant</label>
              <select value={form.cliId||''} onChange={function(e){
                var cid=parseInt(e.target.value);
                var locs=qualLocs(cid);
                setF(Object.assign({},form,{cliId:e.target.value,loc:locs[0]&&locs[0].name||''}));
              }}>
                <option value="">Selecteer klant…</option>
                {myCli.map(function(cl){ return <option key={cl.id} value={cl.id}>{cl.name}</option>; })}
              </select>
            </div>

              <select value={form.loc||''} onChange={function(e){ setF(Object.assign({},form,{loc:e.target.value})); }}>
                <option value="">Selecteer locatie…</option>
                {fLocs.map(function(l){ return <option key={l.name} value={l.name}>{l.name}{l.branchNr?' ('+l.branchNr+')':''}</option>; })}
              </select>
            </div>
            <div className="fg"><label>Datum</label>
              <input type="date" value={form.date||''} onChange={function(e){ setF(Object.assign({},form,{date:e.target.value})); }}/>
            </div>
            <div className="fg"><label>Type</label>
              <select value={form.type||'schade'} onChange={function(e){ setF(Object.assign({},form,{type:e.target.value})); }}>
                {['schade','inname','uitgifte','periodiek','APK'].map(function(t){ return <option key={t} value={t}>{t}</option>; })}
              </select>
            </div>
            <div className="fg"><label>Aantal voertuigen</label>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <button className="btn btn-s btn-sm" onClick={function(){ setF(Object.assign({},form,{count:Math.max(1,(form.count||1)-1)})); }}>−</button>
                <input className="ni" type="number" min="1" value={form.count||1} onChange={function(e){ setF(Object.assign({},form,{count:parseInt(e.target.value)||1})); }}/>
                <button className="btn btn-s btn-sm" onClick={function(){ setF(Object.assign({},form,{count:(form.count||1)+1})); }}>+</button>
              </div>
            </div>
            <div className="fg fgf"><label>🚗 Kenteken(s)</label>
              <input value={form.plate||''} onChange={function(e){ setF(Object.assign({},form,{plate:e.target.value.toUpperCase()})); }}
                placeholder="bv. AB-123-CD" style={{fontFamily:'monospace',fontWeight:700,letterSpacing:1,marginBottom:6}}/>
              <label style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,padding:'8px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',fontSize:12,color:'var(--accent)'}}>
                {plateLoading?'🔍 Kenteken herkennen…':'📷 Foto maken / kiezen (AI herkent kenteken)'}
                <input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={function(e){
                  doScanImage(e.target.files&&e.target.files[0]);
                }}/>
              </label>
              {form.plate&&<div style={{fontSize:11,color:'var(--green)',marginTop:4,fontFamily:'monospace',fontWeight:700}}>✓ {form.plate}</div>}
            </div>
            {isRF&&(
              <React.Fragment>
                <div className="fg"><label>🔍 Schades gevonden</label>
                  <input type="number" min="0" value={form.dmg||0} onChange={function(e){ setF(Object.assign({},form,{dmg:e.target.value})); }}/>
                </div>
                <div className="fg"><label>📥 Returns (ingeleverd)</label>
                  <input type="number" min="0" value={form.ret||0} onChange={function(e){ setF(Object.assign({},form,{ret:e.target.value})); }}/>
                </div>
              </React.Fragment>
            )}
            <div className="fg fgf"><label>Opmerkingen</label>
              <textarea value={form.notes||''} onChange={function(e){ setF(Object.assign({},form,{notes:e.target.value})); }} rows={2} placeholder="Optionele opmerking…"/>
            </div>
          </div>
          {isRF&&form.ret>0&&(
            <div className={'al '+(fOk?'al-g':'al-r')} style={{marginTop:9}}>
              Schade%: <strong>{fPct}%</strong> · {form.dmg} schades {fOk?'✅ OK':'❌ onder minimum'}
            </div>
          )}
        </Modal>
      )}
    </div>
  );
}


function Login({onLogin}) {
  var [email, setE]  = React.useState('');
  var [remember, setRem] = React.useState(true);
  var [pw,    setPW] = React.useState('');
  var [err,   setErr]= React.useState('');

  React.useEffect(function() {
    // Laad altijd alle data vanuit Supabase bij het openen van de app
    supaLoadAll(function(){
      // Na laden: check of er een opgeslagen sessie is
      try{
        var s=localStorage.getItem('wer1_session');
        if(s){var sess=JSON.parse(s);var u=DB.users.find(function(x){return x.id===sess.id&&x.active!==false;});if(u){onLogin(u);return;}}
      }catch(e){}
    });
  },[]);

  var submit = function() {
    setErr('Bezig met inloggen...');
    // Laad verse data vanuit Supabase voor we controleren
    supaLoadAll(function(){
      var u = DB.users.find(function(x){ return x.email===email.trim()&&x.pw===pw; });
      if(!u||!u.active){ setErr('Onjuist e-mailadres of wachtwoord.'); return; }
      setErr('');
      if(remember){try{localStorage.setItem('wer1_session',JSON.stringify({id:u.id}));}catch(e){}}
      onLogin(u);
    });
  };

function UserManagement({user}) {
  const [list, setList] = useState([...DB.users.filter(function(u){return u.active!==false;})]);
  const [modal, setMod] = useState(null);
  const [form, setF]    = useState({});
  const [showPw, setShowPw] = useState({});
  const ROLES = [
    {v:'admin',l:'Admin',desc:'Volledige toegang'},
    {v:'planner',l:'Planner',desc:'Roosters en inspecties bewerken'},
    {v:'kantoor',l:'Kantoor',desc:'Inzage: dashboard, medewerkers, HR, claims'},
    {v:'klant',l:'Klant',desc:'Alleen eigen klantdata'},
    {v:'inspecteur',l:'Inspecteur',desc:'Eigen portaal en inspecties'},
  ];
  const blank = () => ({name:'',email:'',pw:'',role:'kantoor',active:true,empId:null,cliId:null});
  const save = () => {
    if(!form.name||!form.email){alert('Naam en e-mail zijn verplicht.');return;}
    if(modal==='add'&&!form.pw){alert('Wachtwoord is verplicht bij een nieuwe gebruiker.');return;}
    if(modal==='add'){
      if(DB.users.find(function(u){return u.email===form.email;})){alert('E-mail al in gebruik.');return;}
      DB.users.push({...form,id:nid('users'),active:true});
    } else {
      var i=DB.users.findIndex(function(u){return u.id===form.id;});
      var upd={...DB.users[i],...form};
      if(!form.pw) upd.pw=DB.users[i].pw;
      if(i>=0) DB.users[i]=upd;
    }
    lsSave(); setList([...DB.users.filter(function(u){return u.active!==false;})]); setMod(null);
  };
  const deactivate = function(id){
    if(!confirm('Gebruiker deactiveren?')) return;
    var i=DB.users.findIndex(function(u){return u.id===id;});
    if(i>=0){DB.users[i].active=false; lsSave(); setList([...DB.users.filter(function(u){return u.active!==false;})]);}
  };
  const roleColor = function(r){
    return r==='admin'?'var(--danger)':r==='planner'?'var(--accent)':r==='kantoor'?'#8b5cf6':r==='klant'?'var(--warn)':'var(--green)';
  };
  return (
    <div>
      <div className="sh">
        <div><div className="st">Gebruikersbeheer</div><div className="ss">{list.length} actieve gebruikers</div></div>
        <button className="btn btn-p" onClick={function(){setF(blank());setMod('add');}}><Ic d={I.plus} s={13}/>Gebruiker toevoegen</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:8,marginBottom:14}}>
        {ROLES.map(function(r){
          var cnt=list.filter(function(u){return u.role===r.v;}).length;
          return(<div key={r.v} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 16px',borderLeft:'3px solid '+roleColor(r.v)}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <span style={{fontWeight:700,color:roleColor(r.v),fontSize:13}}>{r.l}</span>
              <span style={{background:'var(--bg3)',borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:700}}>{cnt}</span>
            </div>
            <div style={{fontSize:11,color:'var(--text3)'}}>{r.desc}</div>
          </div>);
        })}
      </div>
      <div className="card"><div className="tw"><table>
        <thead><tr><th>Naam</th><th>E-mail</th><th>Rol</th><th>Gekoppeld aan</th><th>Status</th><th></th></tr></thead>
        <tbody>{list.map(function(u){
          var emp=u.empId?DB.employees.find(function(e){return e.id===u.empId;}):null;
          var cli=u.cliId?DB.clients.find(function(cl){return cl.id===u.cliId;}):null;
          return(<tr key={u.id}>
            <td style={{fontWeight:600}}>{u.name}</td>
            <td style={{fontSize:11,color:'var(--text2)',fontFamily:'monospace'}}>{u.email}</td>
            <td><span style={{fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:20,background:roleColor(u.role)+'22',color:roleColor(u.role)}}>{u.role}</span></td>
            <td style={{fontSize:11,color:'var(--text3)'}}>{emp?emp.name:cli?cli.name:'--'}</td>
            <td><span className={u.active!==false?'badge bg':'badge br'}>{u.active!==false?'Actief':'Inactief'}</span></td>
            <td style={{display:'flex',gap:4}}>
              <button className="bic" onClick={function(){setF({...u,pw:''});setMod('edit');}}><Ic d={I.edit} s={11}/></button>
              {u.id!==user.id&&<button className="bic" style={{color:'var(--danger)'}} onClick={function(){deactivate(u.id);}}><Ic d={I.del} s={11}/></button>}
            </td>
          </tr>);
        })}</tbody>
      </table></div></div>
      {(modal==='add'||modal==='edit')&&(
        <Modal title={modal==='add'?'Gebruiker toevoegen':'Gebruiker bewerken'} onClose={function(){setMod(null);}} onSave={save} wide>
          <div className="fgrid">
            <div className="fg"><label>Naam *</label><input value={form.name||''} onChange={function(e){setF({...form,name:e.target.value});}}/></div>
            <div className="fg"><label>E-mailadres *</label><input type="email" value={form.email||''} onChange={function(e){setF({...form,email:e.target.value});}}/></div>
            <div className="fg"><label>{modal==='add'?'Wachtwoord *':'Nieuw wachtwoord (leeg = ongewijzigd)'}</label>
              <div style={{display:'flex',gap:6}}>
                <input type={showPw[form.id||'new']?'text':'password'} value={form.pw||''} onChange={function(e){setF({...form,pw:e.target.value});}} style={{flex:1}}/>
                <button type="button" className="btn btn-s btn-sm" onClick={function(){setShowPw(function(p){var n={...p};n[form.id||'new']=!n[form.id||'new'];return n;});}}>{showPw[form.id||'new']?'Verberg':'Toon'}</button>
              </div>
            </div>
            <div className="fg"><label>Rol *</label>
              <select value={form.role||'kantoor'} onChange={function(e){setF({...form,role:e.target.value});}}>
                {ROLES.map(function(r){return <option key={r.v} value={r.v}>{r.l} -- {r.desc}</option>;})}
              </select>
            </div>
            <div className="fg"><label>Koppel aan medewerker</label>
              <select value={form.empId||''} onChange={function(e){setF({...form,empId:e.target.value?parseInt(e.target.value):null});}}>
                <option value="">-- Geen --</option>
                {DB.employees.filter(function(e){return e.active;}).map(function(e){return <option key={e.id} value={e.id}>{e.name}</option>;})}
              </select>
            </div>
            <div className="fg"><label>Koppel aan klant</label>
              <select value={form.cliId||''} onChange={function(e){setF({...form,cliId:e.target.value?parseInt(e.target.value):null});}}>
                <option value="">-- Geen --</option>
                {DB.clients.filter(function(cl){return !cl.archived;}).map(function(cl){return <option key={cl.id} value={cl.id}>{cl.name}</option>;})}
              </select>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}


function App() {
  const [user,  setUser]  = useState(null);
  const [page,  setPage]  = useState('dashboard');
  const [navOpen,setNavOpen] = useState(false);
  const [theme, setTheme] = useState(function(){ return localStorage.getItem('wer1_theme')||'dark'; });

  useEffect(function(){
    document.body.className = theme==='dark' ? '' : ('theme-'+theme);
    localStorage.setItem('wer1_theme', theme);
  }, [theme]);

  const handleLogin = function(u) {
    setUser(u);
    setPage(u.role==='inspecteur' ? 'portal' : 'dashboard');
  };

  if(!user) return <Login onLogin={handleLogin}/>;
  if(page==='portal') return <EmployeePortal empUser={user} onLogout={function(){ setUser(null); setPage('dashboard'); }}/>;

  var openI   = DB.inspections.filter(function(i){ return i.status==='openstaand'; }).length;
  var apkA    = DB.vehicles.filter(function(v){ return ['kritiek','verlopen'].includes(apkSt(v.apk)); }).length;
  var isAdmin = ['admin','planner'].includes(user.role);
  var initials = user.name.split(' ').map(function(n){ return n[0]; }).join('').slice(0,2).toUpperCase();

  var THEMES = [
    {id:'dark',  icon:'🌑', label:'Donker'},
    {id:'light', icon:'☀️',  label:'Licht'},
    {id:'grey',  icon:'⚙️',  label:'Grijs'},
    {id:'ocean', icon:'🌊', label:'Ocean'},
    {id:'warm',  icon:'🔥', label:'Warm'},
  ];

  var MENU = [
    {id:'dashboard',  icon:I.dash,  label:'Dashboard'},
  ];
  if(isAdmin) MENU.push({id:'roster',    icon:I.roster, label:'Rooster'});
  MENU.push({id:'analytics', icon:'\uD83D\uDCC8', label:'Analytics'});
  if(isAdmin) MENU.push({id:'hr', icon:'HR', label:'HR'});
  if(isAdmin) MENU.push({id:'damage',    icon:I.dmg,    label:'Schade Tracking'});
  if(isAdmin) MENU.push({id:'sixt',      icon:'(S)',     label:'Sixt Turnaround'});
  if(isAdmin) MENU.push({id:'claims',    icon:I.warn,   label:'Claims', badge:(DB.claims||[]).filter(function(c){ return c.status==='openstaand'; }).length||null});
  MENU.push({id:'clients',    icon:I.cli,   label:'Klanten'});

          <div className="page-title">{titles[page]||page}</div>
          <div className="tbr">
            {apkA>0 ? <div style={{display:'flex',alignItems:'center',gap:4,fontSize:11.5,color:'var(--danger)'}}><Ic d={I.warn} s={13}/>APK {apkA}</div> : null}
            <button title="Screenshot huidige pagina als PDF" onClick={function(){
              var contentEl = document.querySelector('.content');
              if(!contentEl){ alert('Niets te exporteren.'); return; }
              var btn = document.activeElement;
              if(btn) btn.blur();
              var pageName = (titles[page]||page||'scherm').replace(/[^a-zA-Z0-9\u00C0-\u024F ]/g,'').trim().replace(/ +/g,'-').toLowerCase();
              var fileName = 'WER1-'+pageName+'-'+new Date().toISOString().slice(0,10)+'.pdf';
              var origOverflow = contentEl.style.overflow;
              contentEl.style.overflow = 'visible';
              html2canvas(contentEl,{
                scale: 1.5,
                useCORS: true,
                allowTaint: true,
                backgroundColor: '#04212f',
                logging: false
              }).then(function(canvas){
                contentEl.style.overflow = origOverflow;
                var imgData = canvas.toDataURL('image/jpeg', 0.82);
                var jsPDFLib = (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : window.jsPDF;
                if(!jsPDFLib){ alert('jsPDF niet geladen'); return; }
                var ptW = canvas.width / 2;
                var ptH = canvas.height / 2;
                var isLand = ptW > ptH;
                var pdf = new jsPDFLib({ orientation: isLand ? 'landscape' : 'portrait', unit: 'pt', format: [ptW, ptH] });
                pdf.addImage(imgData, 'JPEG', 0, 0, ptW, ptH);
                pdf.save(fileName);
              }).catch(function(err){
                contentEl.style.overflow = origOverflow;
                alert('Screenshot mislukt: '+err.message);
              });
            }} style={{background:'rgba(154,228,203,.12)',border:'1px solid rgba(154,228,203,.35)',borderRadius:6,padding:'4px 10px',color:'#9AE4CB',fontSize:11,cursor:'pointer',fontFamily:"'Aptos','Calibri',sans-serif",fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              PDF
            </button>
            <button title="Exporteer alle data als backup" onClick={function(){
              var keys=['wer1_ims_v5','wer1_ims_v6','wer1_ims_v4'];
              var data=null;
              for(var ki=0;ki<keys.length;ki++){
                var d=localStorage.getItem(keys[ki]);
                if(d&&d.length>100){data=d;break;}
              }
              if(!data){ data=JSON.stringify({clients:DB.clients,employees:DB.employees,vehicles:DB.vehicles,inspections:DB.inspections,roster:DB.roster,audit:DB.audit,claims:DB.claims,damageSheets:DB.damageSheets,sixtStats:DB.sixtStats,_id:DB._id}); }
              var a=document.createElement('a');
              a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
              a.download='wer1-backup-'+new Date().toISOString().slice(0,10)+'.json';
              document.body.appendChild(a); a.click(); document.body.removeChild(a);
            }} style={{background:'rgba(12,112,117,.15)',border:'1px solid #0C7075',borderRadius:6,padding:'4px 10px',color:'#0F969C',fontSize:11,cursor:'pointer',fontFamily:"'Aptos','Calibri',sans-serif",fontWeight:600}}>
              💾 Backup
            </button>
            {window.sbReady&&(<>
              <button onClick={function(){if(confirm('Alle huidige data uploaden naar Supabase? Dit overschrijft de online data.'))supaUploadAll();}}
                style={{background:'rgba(0,200,83,.15)',border:'1px solid #00c853',borderRadius:6,
                        padding:'4px 10px',color:'#00c853',fontSize:11,cursor:'pointer',fontWeight:600,marginLeft:4}}
                title="Lokale data naar Supabase uploaden">
                Upload
              </button>
              <button onClick={function(){supaLoadAll(function(){alert('Data herladen vanuit Supabase!');window.location.reload();});}}
                style={{background:'rgba(0,150,255,.15)',border:'1px solid #0096ff',borderRadius:6,
                        padding:'4px 10px',color:'#0096ff',fontSize:11,cursor:'pointer',fontWeight:600,marginLeft:4}}
                title="Verse data ophalen vanuit Supabase">
                Sync
              </button>
            </>)}
            <div style={{position:'relative'}}>
              <select value={theme} onChange={function(e){ setTheme(e.target.value); }}
                style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:7,padding:'4px 26px 4px 8px',color:'var(--text2)',fontSize:11,cursor:'pointer',appearance:'none'}}>
                {THEMES.map(function(t){ return <option key={t.id} value={t.id}>{t.icon} {t.label}</option>; })}
              </select>
              <span style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',fontSize:9,color:'var(--text3)'}}>▾</span>
            </div>
            <div style={{position:'relative'}}>
              <button className="bic"><Ic d={I.bell} s={14}/></button>
              {openI>0 ? <div style={{position:'absolute',top:-3,right:-3,width:13,height:13,background:'var(--danger)',borderRadius:'50%',fontSize:7.5,fontWeight:700,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}>{openI}</div> : null}
            </div>
            <div className="av" style={{width:27,height:27,fontSize:10.5}}>{initials}</div>
          </div>
        </div>
        <div className="content">{pageContent}</div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
